/* ── Doc Modal: shows a doc + Acepto button (enabled after scrolling to end) ── */
function DocModalFirma({ doc, formData, onAccept, onClose }) {
  const { FONT, ink, muted, line, green, primary, accent } = TOKENS;
  if (!doc) return null;

  const scrollRef = React.useRef(null);
  const [scrolledToEnd, setScrolledToEnd] = React.useState(false);

  React.useEffect(() => {
    setScrolledToEnd(false);
    if (scrollRef.current) scrollRef.current.scrollTop = 0;
    // Check if content fits without scrolling (short documents)
    const checkFit = () => {
      const el = scrollRef.current;
      if (el && el.scrollHeight <= el.clientHeight + 40) {
        setScrolledToEnd(true);
      }
    };
    // Delay to let the document render fully
    const t1 = setTimeout(checkFit, 100);
    const t2 = setTimeout(checkFit, 500);
    return () => { clearTimeout(t1); clearTimeout(t2); };
  }, [doc?.id]);

  const handleScroll = (e) => {
    const el = e.target;
    if (el.scrollTop + el.clientHeight >= el.scrollHeight - 40) {
      setScrolledToEnd(true);
    }
  };

  return (
    <div style={{
      position: 'absolute', inset: 0, zIndex: 100,
      background: 'rgba(11,15,16,0.6)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      padding: 32, fontFamily: FONT,
    }}>
      <div onClick={e => e.stopPropagation()} style={{
        width: '100%', maxWidth: 760, maxHeight: '92%',
        background: '#fff', borderRadius: 18,
        border: `2px solid ${ink}`,
        boxShadow: '0 24px 70px rgba(0,0,0,0.35)',
        display: 'flex', flexDirection: 'column', overflow: 'hidden',
      }}>
        {/* Header */}
        <div style={{
          padding: '20px 28px', borderBottom: `1px solid ${line}`,
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          background: `${accent}18`,
          flexShrink: 0,
        }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
            <div style={{
              width: 38, height: 38, borderRadius: 10,
              background: '#fff', border: `1.5px solid ${ink}`,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              flexShrink: 0,
            }}>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                <path d="M14 3H7a2 2 0 00-2 2v14a2 2 0 002 2h10a2 2 0 002-2V8l-5-5z" stroke={ink} strokeWidth="1.8" strokeLinejoin="round"/>
                <path d="M14 3v5h5M8 13h8M8 17h5" stroke={ink} strokeWidth="1.8" strokeLinecap="round"/>
              </svg>
            </div>
            <div>
              <div style={{ fontSize: 10, fontWeight: 800, color: muted, letterSpacing: '0.5px', textTransform: 'uppercase' }}>
                Documento legal
              </div>
              <div style={{ fontSize: 20, fontWeight: 900, letterSpacing: '-0.6px', marginTop: 2 }}>{doc.title}</div>
            </div>
          </div>
          <button onClick={onClose} style={{
            width: 36, height: 36, borderRadius: 10,
            background: '#fff', border: `1.5px solid ${line}`,
            cursor: 'pointer', fontSize: 18, fontWeight: 800, color: ink, fontFamily: FONT,
            flexShrink: 0,
          }}>×</button>
        </div>

        {/* Body — scrollable */}
        <div ref={scrollRef} onScroll={handleScroll} style={{
          overflowY: 'auto', flex: 1,
          background: '#F3F4F6',
          padding: 24,
        }}>
          <div style={{
            maxWidth: 660, margin: '0 auto',
            background: '#fff',
            boxShadow: '0 2px 18px rgba(0,0,0,0.08)',
            borderRadius: 6,
            overflow: 'hidden',
          }}>
            {doc.render(formData)}
          </div>
        </div>

        {/* Footer — Acepto button */}
        <div style={{
          padding: '16px 28px', borderTop: `1px solid ${line}`,
          display: 'flex', justifyContent: 'space-between', gap: 12, alignItems: 'center',
          background: '#fff', flexShrink: 0,
        }}>
          <div style={{ fontSize: 12, color: scrolledToEnd ? green : muted, fontWeight: 600 }}>
            {scrolledToEnd ? '✓ Leíste el documento completo' : 'Leé el documento completo para aceptar'}
          </div>
          <button onClick={onAccept} style={{
            padding: '12px 28px', borderRadius: 12,
            background: scrolledToEnd ? green : '#E0E5EB',
            color: scrolledToEnd ? '#fff' : '#999',
            fontSize: 14, fontWeight: 800,
            border: scrolledToEnd ? `2px solid ${ink}` : '2px solid transparent',
            boxShadow: scrolledToEnd ? `0 3px 0 ${ink}` : 'none',
            cursor: scrolledToEnd ? 'pointer' : 'not-allowed',
            fontFamily: FONT, letterSpacing: '-0.2px',
            transition: 'all .2s',
          }} disabled={!scrolledToEnd}>
            He leído y acepto
          </button>
        </div>
      </div>
    </div>
  );
}

/* ── Signature Canvas Modal ── */
function SignatureModal({ onConfirm, onClose }) {
  const { FONT, ink, muted, line, green, primary, primaryDark } = TOKENS;
  const canvasRef = React.useRef(null);
  const isDrawingRef = React.useRef(false);
  const [hasDrawn, setHasDrawn] = React.useState(false);
  const [askConfirm, setAskConfirm] = React.useState(false);

  const getPos = (e) => {
    const canvas = canvasRef.current;
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
  };

  const startDraw = (e) => {
    e.preventDefault();
    const ctx = canvasRef.current.getContext('2d');
    const pos = getPos(e);
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.strokeStyle = ink;
    isDrawingRef.current = true;
    setHasDrawn(true);
  };

  const draw = (e) => {
    e.preventDefault();
    if (!isDrawingRef.current) return;
    const ctx = canvasRef.current.getContext('2d');
    const pos = getPos(e);
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
  };

  const endDraw = () => { isDrawingRef.current = false; };

  const clearCanvas = () => {
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    setHasDrawn(false);
    setAskConfirm(false);
  };

  const handleConfirmYes = () => {
    const dataUrl = canvasRef.current.toDataURL('image/png');
    onConfirm(dataUrl);
  };

  return (
    <div style={{
      position: 'absolute', inset: 0, zIndex: 100,
      background: 'rgba(11,15,16,0.55)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      padding: 40, fontFamily: FONT,
    }}>
      <div onClick={e => e.stopPropagation()} style={{
        width: '100%', maxWidth: 580,
        background: '#fff', borderRadius: 20,
        border: `2px solid ${ink}`,
        boxShadow: '0 20px 60px rgba(0,0,0,0.3)',
        overflow: 'hidden',
      }}>
        <div style={{
          padding: '20px 28px', borderBottom: `1px solid ${line}`,
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        }}>
          <div>
            <div style={{ fontSize: 20, fontWeight: 900, letterSpacing: '-0.6px' }}>Firma electrónica</div>
            <div style={{ fontSize: 13, color: muted, fontWeight: 500, marginTop: 2 }}>
              Dibujá tu firma en el recuadro
            </div>
          </div>
          <button onClick={onClose} style={{
            width: 36, height: 36, borderRadius: 10,
            background: '#fff', border: `1.5px solid ${line}`,
            cursor: 'pointer', fontSize: 18, fontWeight: 800, color: ink, fontFamily: FONT,
          }}>×</button>
        </div>

        <div style={{ padding: '24px 28px' }}>
          <div style={{
            border: `2px dashed ${line}`, borderRadius: 14,
            background: '#FAFBFC', position: 'relative', overflow: 'hidden',
          }}>
            <canvas
              ref={canvasRef}
              width={520}
              height={200}
              style={{ display: 'block', width: '100%', height: 200, cursor: 'crosshair', touchAction: 'none' }}
              onMouseDown={startDraw}
              onMouseMove={draw}
              onMouseUp={endDraw}
              onMouseLeave={endDraw}
              onTouchStart={startDraw}
              onTouchMove={draw}
              onTouchEnd={endDraw}
            />
            {!hasDrawn && (
              <div style={{
                position: 'absolute', inset: 0,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                color: muted, fontSize: 14, fontWeight: 500, pointerEvents: 'none',
                fontFamily: FONT,
              }}>
                Firmá aquí con el mouse o dedo
              </div>
            )}
          </div>
        </div>

        {askConfirm ? (
          <div style={{
            padding: '20px 28px 24px', borderTop: `1px solid ${line}`, textAlign: 'center',
          }}>
            <div style={{ fontSize: 16, fontWeight: 800, letterSpacing: '-0.3px', marginBottom: 16 }}>
              ¿Está correcta tu firma?
            </div>
            <div style={{ display: 'flex', gap: 12, justifyContent: 'center' }}>
              <button onClick={clearCanvas} style={{
                padding: '12px 32px', borderRadius: 12,
                background: '#fff', border: `2px solid ${line}`,
                fontSize: 14, fontWeight: 800, color: ink, cursor: 'pointer', fontFamily: FONT,
              }}>No, volver a firmar</button>
              <button onClick={handleConfirmYes} style={{
                padding: '12px 32px', borderRadius: 12,
                background: green, border: `2px solid ${ink}`,
                boxShadow: `0 3px 0 ${ink}`,
                fontSize: 14, fontWeight: 800, color: '#fff', cursor: 'pointer', fontFamily: FONT,
              }}>Sí, confirmar</button>
            </div>
          </div>
        ) : (
          <div style={{
            padding: '16px 28px 24px',
            display: 'flex', justifyContent: 'space-between', alignItems: 'center',
          }}>
            <button onClick={clearCanvas} style={{
              padding: '10px 20px', borderRadius: 10,
              background: '#fff', border: `1.5px solid ${line}`,
              fontSize: 12, fontWeight: 700, color: muted, cursor: 'pointer', fontFamily: FONT,
            }}>Limpiar</button>
            <button onClick={() => hasDrawn && setAskConfirm(true)} style={{
              padding: '12px 28px', borderRadius: 12,
              background: hasDrawn ? `linear-gradient(180deg, ${primary} 0%, ${primaryDark} 100%)` : '#E0E5EB',
              color: hasDrawn ? '#fff' : '#999',
              border: hasDrawn ? `2px solid ${ink}` : '2px solid transparent',
              boxShadow: hasDrawn ? `0 3px 0 ${ink}` : 'none',
              fontSize: 14, fontWeight: 800, cursor: hasDrawn ? 'pointer' : 'not-allowed',
              fontFamily: FONT, letterSpacing: '-0.2px',
              transition: 'all .2s',
            }}>Confirmar firma</button>
          </div>
        )}
      </div>
    </div>
  );
}

/* ── Doc row — shows "Leer" or green check ── */
function DocRowFirma({ doc, accepted, onOpen, index }) {
  const { ink, muted, line, green, greenSoft, accent } = TOKENS;
  return (
    <div style={{
      padding: 11, borderRadius: 12,
      background: accepted ? greenSoft : '#fff',
      border: accepted ? `2px solid ${green}` : `1.5px solid ${line}`,
      display: 'flex', alignItems: 'center', gap: 12,
      transition: 'all .15s',
    }}>
      <div style={{
        width: 36, height: 36, borderRadius: 10,
        background: accepted ? `${green}22` : `${accent}14`,
        border: `1.5px solid ${accepted ? green : `${accent}55`}`,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        flexShrink: 0,
        fontSize: 14, fontWeight: 900,
        color: accepted ? green : '#0F1923',
      }}>
        {accepted ? (
          <svg width="20" height="20" viewBox="0 0 14 14" fill="none">
            <path d="M2.5 7.5 L5.5 10.5 L11.5 3.5" stroke={green} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        ) : (
          <span style={{ fontSize: 16 }}>{index + 1}</span>
        )}
      </div>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 14, fontWeight: 800, letterSpacing: '-0.2px', color: ink }}>{doc.title}</div>
        <div style={{ fontSize: 12, color: muted, fontWeight: 500, marginTop: 2 }}>{doc.subtitle}</div>
      </div>
      {accepted ? (
        <div style={{
          padding: '6px 12px', borderRadius: 9,
          background: green, color: '#fff',
          fontSize: 11, fontWeight: 800, letterSpacing: '0.3px', textTransform: 'uppercase',
        }}>
          Aceptado
        </div>
      ) : (
        <button onClick={onOpen} style={{
          padding: '9px 18px', borderRadius: 9,
          background: 'transparent', border: `1.5px solid ${ink}`,
          fontSize: 12, fontWeight: 800, color: ink, cursor: 'pointer',
          letterSpacing: '0.3px', textTransform: 'uppercase',
          fontFamily: "'Plus Jakarta Sans', sans-serif",
        }}>Leer</button>
      )}
    </div>
  );
}

/* ── Main StepFirma ── */
function StepFirma({ value, onChange, formData, nombreCompleto = '' }) {
  const { FONT, ink, muted, line, green, primary, primaryDark } = TOKENS;
  const [modalDoc, setModalDoc] = React.useState(null);
  const [showSignature, setShowSignature] = React.useState(false);
  const [signatureData, setSignatureData] = React.useState(null);

  const docs = FIRMA_DOCS;
  const allAccepted = docs.every(d => value[d.id]);

  const handleAcceptDoc = () => {
    if (modalDoc) {
      onChange({ ...value, [modalDoc.id]: true });
      setModalDoc(null);
    }
  };

  const handleSignatureConfirm = (dataUrl) => {
    setSignatureData(dataUrl);
    setShowSignature(false);
    onChange({ ...value, signed: true });
  };

  return (
    <div style={{ width: '100%', maxWidth: 620, margin: '0 auto', display: 'flex', flexDirection: 'column', gap: 9 }}>
      <div style={{
        padding: '9px 14px', borderRadius: 10,
        background: '#FAFBFC', border: `1px dashed ${line}`,
        fontSize: 12, color: muted, fontWeight: 500, lineHeight: 1.4,
      }}>
        Leé los <b style={{ color: ink, fontWeight: 800 }}>4 documentos</b> que componen la operación.
        Una vez aceptados, firmá electrónicamente para finalizar.
      </div>

      {/* Document list */}
      {docs.map((d, i) => (
        <DocRowFirma
          key={d.id}
          doc={d}
          index={i}
          accepted={!!value[d.id]}
          onOpen={() => setModalDoc(d)}
        />
      ))}

      {/* Firmar button — appears after all docs accepted */}
      <div style={{
        marginTop: 4, padding: 14, borderRadius: 13,
        background: signatureData ? `${green}0e` : allAccepted ? '#fff' : '#F7F9FC',
        border: signatureData ? `2px solid ${green}` : allAccepted ? `2px solid ${ink}` : `1.5px dashed ${line}`,
        opacity: allAccepted ? 1 : 0.55,
        transition: 'all .2s',
      }}>
        <div style={{ fontSize: 11, fontWeight: 800, color: muted, textTransform: 'uppercase', letterSpacing: '0.4px', marginBottom: 6 }}>
          Firma electrónica
        </div>
        <div style={{ fontSize: 12.5, color: muted, fontWeight: 500, marginBottom: 10, lineHeight: 1.4 }}>
          {signatureData
            ? 'Tu firma fue registrada con éxito. Podés continuar.'
            : allAccepted
              ? 'Aceptaste los 4 documentos. Firmá para que se asienten en todos los anexos.'
              : 'Leé y aceptá los 4 documentos para poder firmar.'}
        </div>

        {signatureData ? (
          <div style={{
            padding: '10px 18px', borderRadius: 12,
            background: '#fff', border: `1.5px solid ${line}`,
            display: 'flex', alignItems: 'center', gap: 14,
          }}>
            <img src={signatureData} alt="Tu firma" style={{ height: 60, objectFit: 'contain' }} />
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: ink }}>{nombreCompleto}</div>
              <div style={{ fontSize: 11, color: green, fontWeight: 600, marginTop: 2 }}>Firmado electrónicamente · Ley 25.506</div>
            </div>
            <div style={{
              width: 32, height: 32, borderRadius: 999, background: green,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
            }}>
              <svg width="16" height="16" viewBox="0 0 14 14" fill="none">
                <path d="M2.5 7.5 L5.5 10.5 L11.5 3.5" stroke="#fff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            </div>
          </div>
        ) : (
          <button
            onClick={() => allAccepted && setShowSignature(true)}
            disabled={!allAccepted}
            style={{
              width: '100%', padding: '12px 24px', borderRadius: 12,
              background: allAccepted ? `linear-gradient(180deg, ${primary} 0%, ${primaryDark} 100%)` : '#E0E5EB',
              color: allAccepted ? '#fff' : '#999',
              border: allAccepted ? `2px solid ${ink}` : '2px solid transparent',
              boxShadow: allAccepted ? `0 4px 0 ${ink}` : 'none',
              fontSize: 15, fontWeight: 900, cursor: allAccepted ? 'pointer' : 'not-allowed',
              fontFamily: FONT, letterSpacing: '-0.2px',
              textTransform: 'uppercase',
              transition: 'all .2s',
            }}
          >Firmar</button>
        )}
      </div>

      {/* Modals */}
      <DocModalFirma doc={modalDoc} formData={formData} onAccept={handleAcceptDoc} onClose={() => setModalDoc(null)} />
      {showSignature && (
        <SignatureModal
          onConfirm={handleSignatureConfirm}
          onClose={() => setShowSignature(false)}
        />
      )}
    </div>
  );
}

Object.assign(window, { StepFirma, DocModalFirma, SignatureModal, DocRowFirma });

</script>
<script type="text/babel" data-source="StepExito.jsx">
// Step 7 — Éxito: confetti + icono grande + resumen del préstamo

function Confetti({ count = 40 }) {
  const { yellow, yellowDark, green, ink } = TOKENS;
  const colors = [yellow, yellowDark, green, '#1B6B93', '#E3F0F7'];
  const pieces = React.useMemo(() =>
  Array.from({ length: count }, (_, i) => ({
    id: i,
    left: Math.random() * 100,
    size: 6 + Math.random() * 10,
    delay: Math.random() * 3,
    duration: 4 + Math.random() * 4,
    color: colors[i % colors.length],
    rotate: Math.random() * 360,
    shape: i % 3
  })),
  [count]);

  return (
    <div style={{
      position: 'absolute', inset: 0, pointerEvents: 'none', overflow: 'hidden'
    }}>
      <style>{`
        @keyframes aprisaConfetti {
          0% { transform: translateY(-60px) rotate(0deg); opacity: 0; }
          10% { opacity: 1; }
          100% { transform: translateY(900px) rotate(720deg); opacity: 0.8; }
        }
      `}</style>
      {pieces.map((p) =>
      <div key={p.id} style={{
        position: 'absolute',
        left: `${p.left}%`, top: 0,
        width: p.size, height: p.size,
        background: p.color,
        borderRadius: p.shape === 0 ? '50%' : p.shape === 1 ? 2 : 0,
        animation: `aprisaConfetti ${p.duration}s ${p.delay}s linear infinite`,
        transform: `rotate(${p.rotate}deg)`
      }} />
      )}
    </div>);

}

function StepExito({ formData }) {
  const { FONT, ink, muted, line, green, greenDark, greenSoft, yellow, yellowDark } = TOKENS;

  const oferta = formData.oferta || {};
  const monto = Number(oferta.monto) || 0;

  const totalDevolver = cuotaValor * cuotas;

  const cbuRaw = formData.cbu?.cbu || '';
  const cbu = cbuRaw.length === 22
    ? '···· ···· ···· ' + cbuRaw.slice(-4)
    : '···· ···· ···· 4821';

  const solicitudId = 'MC-2026-' + String(Math.floor(Math.random() * 900000) + 100000);

  return (
    <div style={{ position: 'relative', width: '100%' }}>
      <Confetti count={50} />
      <div style={{
        width: '100%', maxWidth: 620, margin: '0 auto',
        display: 'flex', flexDirection: 'column', alignItems: 'center',
        textAlign: 'center', gap: 13, position: 'relative', zIndex: 1
      }}>
        {/* Big green check */}
        <div style={{
          width: 88, height: 88, borderRadius: '50%',
          background: `linear-gradient(135deg, ${green} 0%, ${greenDark} 100%)`,
          border: `4px solid ${ink}`,
          boxShadow: `0 5px 0 ${ink}, 0 10px 26px ${green}66`,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          marginTop: 4
        }}>
          <svg width="46" height="46" viewBox="0 0 60 60" fill="none">
            <path d="M14 32 L24 42 L46 18" stroke="#fff" strokeWidth="6" strokeLinecap="round" strokeLinejoin="round" />
          </svg>
        </div>

        <p style={{
          fontSize: 14, color: muted, fontWeight: 500,
          lineHeight: 1.45, maxWidth: 480, margin: '0'
        }}>
          Acreditaremos <b style={{ color: ink, fontWeight: 800 }}>{formatARS(monto)}</b> en tu CBU
          dentro de las
          <b style={{ color: ink, fontWeight: 800 }}> 24 horas hábiles</b>.
        </p>

        {/* Summary card */}
        <div style={{
          width: '100%', padding: 16, borderRadius: 16,
          background: '#fff', border: `2px solid ${ink}`,
          boxShadow: `0 4px 0 ${ink}`,
          textAlign: 'left'
        }}>
          <div style={{ fontSize: 11, fontWeight: 800, color: muted, textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: 8 }}>
            Resumen de la operación
          </div>
          {[
          ['Monto solicitado', formatARS(monto)],
          ['Cantidad de cuotas', `${cuotas} cuotas fijas`],
          ['Valor de la cuota', formatARS(cuotaValor)],
          ['Total a devolver', formatARS(totalDevolver)],
          ['Acreditación en', cbu.length > 30 ? '···· ···· ···· 4821' : cbu],
          ['Solicitud N°', solicitudId]].
          map(([k, v], i, arr) =>
          <div key={k} style={{
            display: 'flex', justifyContent: 'space-between',
            padding: '7px 0',
            borderBottom: i < arr.length - 1 ? `1px solid ${line}` : 'none'
          }}>
              <span style={{ fontSize: 13, color: muted, fontWeight: 600 }}>{k}</span>
              <span style={{ fontSize: 13, fontWeight: 800, color: ink, textAlign: 'right' }}>{v}</span>
            </div>
          )}
        </div>

        <div style={{
          display: 'flex', alignItems: 'center', gap: 10,
          fontSize: 12, color: muted, fontWeight: 600,
          marginTop: 4
        }}>
          <span>📧 Te enviamos el contrato a tu email</span>
          <span style={{ color: line }}>·</span>
          <span>🔒 Conexión segura</span>
        </div>
      </div>
    </div>);

}

Object.assign(window, { StepExito, Confetti });
</script>

// Step router — manages flow state + navigation between steps.
// Presented inside an artboard alongside the landing.

function FlowStepViewer({ initialStep = 'sms', userEmail = 'juan.perez@gmail.com', userPhone = { areaCode: '', number: '' } }) {
  const [stepId, setStepId] = React.useState(initialStep);
  const [showSimLoading, setShowSimLoading] = React.useState(false);
  const [form, setForm] = React.useState({
    smsCode: '',
    domicilio: { localidad: '', codigoPostal: '', calle: '', numero: '' },
    laboral: { sueldoNeto: '', antiguedad: '', empresa: '' },
    oferta: { monto: 500000, cuotas: 12 },
    email: { resent: false, validated: false, address: userEmail },
    identidad: {},
    fotos: { selfieNeutra: false, selfieSonriente: false, dniFrente: false, dniDorso: false },
    docs: { bonoSueldo: null, constanciaCBU: null },
    cbu: { cbu: '', alias: '', titularCuenta: '', banco: '' },
    acepta: { cesion: false, anexo: false, instrucciones: false, pagare: false, signed: false },
  });

  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const order = ['sms', 'domicilio', 'laboral', 'oferta', 'email', 'identidad', 'fotos', 'docs', 'cbu', 'firma', 'exito'];
  const idx = order.indexOf(stepId);
  const goToNext = () => setStepId(order[Math.min(idx + 1, order.length - 1)]);
  const next = () => {
    if (stepId === 'laboral') { setShowSimLoading(true); return; }
    goToNext();
  };

  // Validation per step
  const canContinue = (() => {
    switch (stepId) {
      case 'sms':         return form.smsCode.length === 6;
      case 'domicilio':   return form.domicilio.localidad && form.domicilio.codigoPostal && form.domicilio.calle && form.domicilio.numero;
      case 'laboral':     return !!form.laboral.sueldoNeto && !!form.laboral.antiguedad && form.laboral.empresa.trim().length > 0;
      case 'oferta':      return Number(form.oferta.monto) > 0 && Number(form.oferta.cuotas) > 0;
      case 'email':       return !!form.email.validated;
      case 'identidad':   return true;
      case 'fotos':       return !!form.fotos.selfieNeutra && !!form.fotos.selfieSonriente && !!form.fotos.dniFrente && !!form.fotos.dniDorso;
      case 'docs':        return !!form.docs.bonoSueldo && !!form.docs.constanciaCBU;
      case 'cbu':         return form.cbu.cbu.length === 22 && form.cbu.titularCuenta.trim().length > 0;
      case 'firma':       return form.acepta.cesion && form.acepta.anexo && form.acepta.instrucciones && form.acepta.pagare && form.acepta.signed;
      default:            return true;
    }
  })();

  const continueLabel =
    stepId === 'firma'  ? 'Finalizar' :
    stepId === 'oferta' ? 'Solicitar este préstamo' :
    'Continuar';

  // 'fotos' displays under the same header as 'identidad'
  const displayStepId = stepId === 'fotos' ? 'identidad' : stepId;

  const body = (() => {
    switch (stepId) {
      case 'sms':         return <StepSMS value={form.smsCode} onChange={v => set('smsCode', v)} onSubmit={next} />;
      case 'domicilio':   return <StepDomicilio value={form.domicilio} onChange={v => set('domicilio', v)} />;
      case 'laboral':     return <StepLaboral value={form.laboral} onChange={v => set('laboral', v)} />;
      case 'oferta':      return <StepOferta value={form.oferta} onChange={v => set('oferta', v)} />;
      case 'email':       return <StepEmailValidacion value={form.email} onChange={v => set('email', v)} onNext={next} email={userEmail} />;
      case 'identidad':   return <StepIdentidad value={form.identidad} onChange={v => set('identidad', v)} />;
      case 'fotos':       return <StepFotos value={form.fotos} onChange={v => set('fotos', v)} />;
      case 'docs':        return <StepDocs value={form.docs} onChange={v => set('docs', v)} />;
      case 'cbu':         return <StepCBU formData={form.cbu} onChange={v => set('cbu', v)} />;
      case 'firma':       return <StepFirma value={form.acepta} onChange={v => set('acepta', v)} formData={form} nombreCompleto={form.cbu.titularCuenta || ''} />;
      case 'exito':       return <StepExito formData={form} />;
      default:            return null;
    }
  })();

  const bodyMaxWidth = (() => {
    switch (stepId) {
      case 'docs':        return 760;
      case 'oferta':      return 640;
      case 'cbu':         return 500;
      case 'identidad':   return 660;
      case 'fotos':       return 560;
      default:            return 560;
    }
  })();

  // Exito uses no standard footer (different CTA tone)
  return (
    <>
      {showSimLoading && (
        <LoadingTransition
          duration={5000}
          title="Simulando tu préstamo"
          messages={[
            'Estamos simulando el monto y las cuotas de la préstamo que podemos darte...',
            'Analizando tu perfil y capacidad de pago...',
            'Preparando tu oferta personalizada...'
          ]}
          successTitle="¡Tu oferta está lista!"
          successSubtitle="Elegí monto y cuotas en el próximo paso"
          onComplete={() => { setShowSimLoading(false); goToNext(); }}
        />
      )}
      <StepShell
        stepId={displayStepId}
        onContinue={next}
        continueLabel={continueLabel}
        continueDisabled={!canContinue}
        bodyMaxWidth={bodyMaxWidth}
        showFooter={stepId !== 'exito' && stepId !== 'email'}
        subtitleOverride={stepId === 'sms' ? maskedPhoneSubtitle(userPhone) : undefined}
      >
        {body}
      </StepShell>
    </>
  );
}

Object.assign(window, { FlowStepViewer });

</script>

// LoadingTransition — fullscreen overlay with animated logo + progress
// Shows for 3 seconds then calls onComplete

function LoadingTransition({ onComplete, duration = 2400, title, subtitle, successTitle, successSubtitle, messages }) {
  const { FONT, primary, primaryDark, green, ink, muted } = TOKENS;
  const [progress, setProgress] = React.useState(0);
  const [phase, setPhase] = React.useState('loading'); // loading | success | exit

  React.useEffect(() => {
    const start = Date.now();
    const iv = setInterval(() => {
      const elapsed = Date.now() - start;
      const p = Math.min(elapsed / duration, 1);
      // Ease out cubic for smooth deceleration
      const eased = 1 - Math.pow(1 - p, 3);
      setProgress(eased * 100);
      if (p >= 1) {
        clearInterval(iv);
        setPhase('success');
        setTimeout(() => {
          setPhase('exit');
          setTimeout(() => onComplete && onComplete(), 500);
        }, 600);
      }
    }, 30);
    return () => clearInterval(iv);
  }, [duration]);

  const defaultMessages = ['Verificando datos...', 'Analizando perfil crediticio...', 'Preparando tu oferta...'];
  const msgs = messages || defaultMessages;
  const msgIdx = progress < 33 ? 0 : progress < 66 ? 1 : 2;

  const headSuccessSubtitle = successSubtitle || 'Redirigiendo al siguiente paso...';

  return (

        position: 'fixed', inset: 0, zIndex: 99998,

        borderRadius: 24,

        zIndex: 99999,
        display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
        padding: '40px 32px',
        fontFamily: FONT,
        opacity: phase === 'exit' ? 0 : 1,
        transition: 'opacity 0.5s ease-out, transform 0.5s ease-out',
      }}>
      {/* Animated glow rings */}
      <div style={{ position: 'absolute', inset: 0, overflow: 'hidden', pointerEvents: 'none', borderRadius: 24 }}>
        <div style={{
          position: 'absolute', top: '50%', left: '50%',
          width: 400, height: 400, marginLeft: -200, marginTop: -200,
          borderRadius: '50%',
          border: `2px solid ${green}22`,
          animation: 'ring-pulse 2s ease-out infinite',
        }} />
        <div style={{
          position: 'absolute', top: '50%', left: '50%',
          width: 300, height: 300, marginLeft: -150, marginTop: -150,
          borderRadius: '50%',
          border: `2px solid ${green}18`,
          animation: 'ring-pulse 2s ease-out 0.5s infinite',
        }} />
      </div>

      {/* Logo container with pulse */}
      <div style={{
        position: 'relative',
        width: 100, height: 100,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        marginBottom: 28,
      }}>
        {/* Spinning ring behind logo */}
        <div style={{
          position: 'absolute', inset: -12,
          borderRadius: '50%',
          border: `3px solid ${green}33`,
          borderTopColor: phase === 'success' ? green : '#fff',
          animation: phase === 'success' ? 'none' : 'logo-spin 1.2s linear infinite',
          transition: 'border-color 0.3s',
        }} />
        {/* Check overlay on success */}
        {phase === 'success' && (
          <div style={{
            position: 'absolute', inset: -12,
            borderRadius: '50%',
            background: `${green}33`,
            border: `3px solid ${green}`,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            animation: 'check-pop 0.4s ease-out',
          }}>
          </div>
        )}
        <TuMutualMark size={80} />
        {phase === 'success' && (
          <div style={{
            position: 'absolute', bottom: -6, right: -6,
            width: 32, height: 32, borderRadius: '50%',
            background: green, border: '3px solid #D6EDDC',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            animation: 'check-pop 0.4s ease-out',
          }}>
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M3 8.5 L6.5 12 L13 4" stroke="#fff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </div>
        )}
      </div>

      {/* Text */}
      <div style={{
        fontSize: 22, fontWeight: 800, color: '#1F2937',
        letterSpacing: '-0.5px', marginBottom: 8, textAlign: 'center',
      }}>
        {phase === 'success' ? headSuccessTitle : headTitle}
      </div>
      <div style={{
        fontSize: 14, fontWeight: 500, color: '#6B7280',
        marginBottom: 28, textAlign: 'center',
        minHeight: 20,
      }}>
        {phase === 'success' ? headSuccessSubtitle : (subtitle || msgs[msgIdx])}
      </div>

      {/* Progress bar */}
      <div style={{
        width: 260, height: 6, borderRadius: 999,
        background: 'rgba(0,0,0,0.08)',

        <div style={{

          background: phase === 'success'
            ? green
            : `linear-gradient(90deg, ${green} 0%, #F5C518 100%)`,
          width: `${phase === 'success' ? 100 : progress}%`,
          transition: phase === 'success' ? 'width 0.3s, background 0.3s' : 'none',
        }} />
      </div>

      {/* Percentage */}
      <div style={{
        fontSize: 12, fontWeight: 700, color: green,
        marginTop: 10, letterSpacing: '0.3px',
      }}>
        {phase === 'success' ? '100%' : `${Math.round(progress)}%`}
      </div>

      <style>{`
        @keyframes logo-spin {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }
        @keyframes ring-pulse {
          0% { transform: scale(0.8); opacity: 0.6; }
          100% { transform: scale(1.5); opacity: 0; }
        }
        @keyframes check-pop {
          0% { transform: scale(0); opacity: 0; }
          60% { transform: scale(1.15); }
          100% { transform: scale(1); opacity: 1; }
        }
      `}</style>
      </div>
    </>
  );
}

Object.assign(window, { LoadingTransition });

</script>

// Hook compartido: detecta viewport mobile para adaptar layouts (split → stack, etc.)
function useIsMobile(bp = 800) {
  const [m, setM] = React.useState(
    typeof window !== 'undefined' ? window.innerWidth <= bp : false
  );
  React.useEffect(() => {
    const on = () => setM(window.innerWidth <= bp);
    on();
    window.addEventListener('resize', on);
    return () => window.removeEventListener('resize', on);
  }, [bp]);
  return m;
}

// Build masked phone subtitle: "+54 9 299 •••• 78"
function maskedPhoneSubtitle({ areaCode, number }) {
  if (!areaCode && !number) return undefined; // fall back to default
  const num = number || '';
  const lastTwo = num.slice(-2);
  const masked = num.length > 2 ? '••••' : '••••';
  const phone = `+54 9 ${areaCode || '•••'} ${masked} ${lastTwo}`;
  return `Te enviamos un código por SMS al ${phone}`;

function CampaignPip({ onGoToFinal }) {

  // Sin scroll programático: el contenedor de chat usa flex column-reverse,

  const green = '#005B44';

  const split = convoStep >= 6;  // a partir del aviso "un asesor se comunicará" aparece el CRM

  const focusStyle = (who) => ({

    pause();                                                        // ⏸ PAUSA 2: popup CUAD visible

    pause();                                                        // ⏸ PAUSA 3: popup Simulador visible
    seq(600,  () => setShowSimulador(false));                      // se cierra el simulador

    seq(1600, () => { setTyping(false); setConvoStep(7); });        // Dana: CUAD opciones + ¿cuál te interesa?

    pause();                                                        // ⏸ PAUSA 4: cliente respondió que sí, antes de volver al CRM
    seq(1500, () => { setCompletarBtn(true); setFocusTarget('crm'); }); // foco al CRM → botón Completar
    seq(1600, () => setOfertaModal(true));                         // Dana presiona Completar → modal sobre el CRM
    seq(2500, () => setOfertaFilled(true));                        // campos se completan (se aprecia)
    pause();                                                        // ⏸ PAUSA 5: datos completos y visibles en pantalla
    seq(900,  () => { setOfertaModal(false); setCrmStage(3); setCompletado(true); setDocsModal(true); }); // Guardar → abre modal de docs
    seq(1400, () => setDocsLoadedCount(1));                        // doc 1 cargado
    seq(700,  () => setDocsLoadedCount(2));                        // doc 2 cargado

      if (i >= steps.length) return;

        resumeRef.current = () => { resumeRef.current = null; setPaused(false); run(); };
        return;
      }

    };

};
const FINAL_TOTAL = 11;

// Pasos visibles en la barra de progreso (identidad+fotos = 1; éxito excluido)
const FINAL_VISIBLE = [
  { id: 'docs',       label: 'Documentación' },
  { id: 'cbu',        label: 'CBU' },
  { id: 'personales', label: 'Datos personales' },
  { id: 'dirdecl',    label: 'Dir. declarada' },
  { id: 'dirlab',     label: 'Dir. laboral' },
  { id: 'infolab',    label: 'Info. laboral' },
  { id: 'sms',        label: 'SMS' },

  { id: 'firma',      label: 'Firma' },
  { id: 'email',      label: 'Email' },
];

// Barra de pasos idéntica a la del Flujo Completo (círculos + labels + conectores)
function FinalStepProgress({ stepId }) {
  const { green, ink, muted, line, primary } = TOKENS;
  const activeRing = 'rgba(0,91,68,0.18)';
  const steps = FINAL_VISIBLE;
  const lookup = stepId === 'fotos' ? 'identidad' : stepId;
  const currentIndex = stepId === 'exito' ? steps.length : steps.findIndex((s) => s.id === lookup);

  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 0, width: '100%' }}>
      {steps.map((s, i) => {
        const done = i < currentIndex;
        const active = i === currentIndex;
        const pending = i > currentIndex;
        return (
          <React.Fragment key={s.id}>
            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8, minWidth: 80 }}>
              <div style={{
                width: 30, height: 30, borderRadius: 999,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontSize: 13, fontWeight: 800,
                background: done ? green : '#fff',
                color: done ? '#fff' : active ? primary : muted,
                border: done ? `2px solid ${green}` : active ? `2px solid ${primary}` : `1.5px solid ${line}`,
                transition: 'all .2s',
                boxShadow: active ? `0 0 0 4px ${activeRing}` : 'none',
              }}>
                {done ?
                  <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                    <path d="M2.5 7.5 L5.5 10.5 L11.5 3.5" stroke="#fff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
                  </svg> :
                  i + 1}
              </div>
              <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '-0.1px', color: pending ? muted : ink, whiteSpace: 'nowrap' }}>{s.label}</div>
            </div>
            {i < steps.length - 1 &&
              <div style={{ flex: 1, height: 2, marginTop: -22, background: done ? green : line, borderRadius: 2, transition: 'background .2s' }} />}
          </React.Fragment>
        );
      })}
    </div>
  );
}

// Input reutilizable para los pasos nuevos
function FInput({ label, value, onChange, placeholder, type = 'text', required, options }) {
  const { FONT, ink, muted, line, green } = TOKENS;
  const [focus, setFocus] = React.useState(false);
  const base = {
    width: '100%', height: 46, padding: '0 14px',
    border: `1.5px solid ${focus ? green : line}`, borderRadius: 12,
    fontSize: 15, fontWeight: 500, fontFamily: FONT, color: ink, outline: 'none',
    transition: 'border 0.2s', background: '#fff',
  };
  return (
    <div>
      <label style={{ display: 'block', fontSize: 14, fontWeight: 700, color: ink, marginBottom: 5 }}>
        {label} {required && <span style={{ color: '#D93025' }}>*</span>}
      </label>
      {options ? (
        <select value={value} onChange={e => onChange(e.target.value)}
          onFocus={() => setFocus(true)} onBlur={() => setFocus(false)} style={base}>
          <option value="" disabled>Seleccionar</option>
          {options.map(o => <option key={o} value={o}>{o}</option>)}
        </select>
      ) : (
        <input type={type} value={value} placeholder={placeholder}
          onChange={e => onChange(e.target.value)}
          onFocus={() => setFocus(true)} onBlur={() => setFocus(false)} style={base} />
      )}
    </div>
  );
}

function FinalFlowViewer() {
  const [stepId, setStepId] = React.useState('docs');
  const [animClass, setAnimClass] = React.useState('fade-in');
  const [form, setForm] = React.useState({
    docs: { bono1: null, bono2: null, bono3: null, servicio: null, comprobanteCBU: null, tarjetaDebito: null },
    cbu: { cbu: '' },
    personales: { fechaNac: '', nacionalidad: '' },
    dirDecl: { calle: '', depto: '', localidad: '', cp: '' },
    dirLab: { empresa: '', localidad: '', calle: '', piso: '' },
    infoLab: { antiguedad: '', ingreso: '' },
    sms: '',
    identidad: {},
    fotos: { selfieNeutra: false, selfieSonriente: false, dniFrente: false, dniDorso: false },
    firma: {},
    email: { resent: false, validated: false, address: 'juan.perez@gmail.com' },
    oferta: { monto: 1000000, cuotas: 24 },
  });
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const order = ['docs', 'cbu', 'personales', 'dirdecl', 'dirlab', 'infolab', 'sms', 'identidad', 'fotos', 'firma', 'email', 'exito'];
  const idx = order.indexOf(stepId);

  const goToStep = (s) => {
    setAnimClass('page-exit');
    setTimeout(() => { setStepId(s); setAnimClass('page-enter'); window.scrollTo({ top: 0, behavior: 'smooth' }); }, 250);
  };
  const next = () => goToStep(order[Math.min(idx + 1, order.length - 1)]);

  const canContinue = (() => {
    switch (stepId) {
      case 'docs':       return Object.values(form.docs).every(Boolean);
      case 'cbu':        return form.cbu.cbu.length === 22;
      case 'personales': return !!form.personales.fechaNac && !!form.personales.nacionalidad;
      case 'dirdecl':    return form.dirDecl.calle && form.dirDecl.localidad && form.dirDecl.cp;
      case 'dirlab':     return form.dirLab.empresa && form.dirLab.localidad && form.dirLab.calle;
      case 'infolab':    return !!form.infoLab.antiguedad && !!form.infoLab.ingreso;
      case 'sms':        return form.sms.length === 6;
      case 'identidad':  return true;
      case 'fotos':      return form.fotos.selfieNeutra && form.fotos.selfieSonriente && form.fotos.dniFrente && form.fotos.dniDorso;
      case 'firma':      return FINAL_CONTRATOS.every(c => form.firma[c.id]) && form.firma.signed;
      case 'email':      return !!form.email.validated;
      default:           return true;
    }
  })();

  const step = FINAL_STEPS[stepId];
  const continueLabel = stepId === 'firma' ? 'Finalizar' : 'Continuar';

  const bodyMaxWidth = (() => {
    switch (stepId) {
      case 'docs':      return 700;
      case 'cbu':       return 500;
      case 'identidad': return 660;
      case 'fotos':     return 560;
      case 'firma':     return 640;
      default:          return 560;
    }
  })();

  const body = (() => {
    switch (stepId) {
      case 'docs':       return <FinalStepDocs value={form.docs} onChange={v => set('docs', v)} />;
      case 'cbu':        return <FinalStepCBU value={form.cbu} onChange={v => set('cbu', v)} />;
      case 'personales': return <FinalStepPersonales value={form.personales} onChange={v => set('personales', v)} />;
      case 'dirdecl':    return <FinalStepDirDecl value={form.dirDecl} onChange={v => set('dirDecl', v)} />;
      case 'dirlab':     return <FinalStepDirLab value={form.dirLab} onChange={v => set('dirLab', v)} />;
      case 'infolab':    return <FinalStepInfoLab value={form.infoLab} onChange={v => set('infoLab', v)} />;
      case 'sms':        return <StepSMS value={form.sms} onChange={v => set('sms', v)} onSubmit={next} />;
      case 'identidad':  return <StepIdentidad value={form.identidad} onChange={v => set('identidad', v)} />;
      case 'fotos':      return <StepFotos value={form.fotos} onChange={v => set('fotos', v)} />;
      case 'firma':      return <FinalStepFirma value={form.firma} onChange={v => set('firma', v)} nombre={form.dirDecl.calle ? '' : ''} />;
      case 'email':      return <StepEmailValidacion value={form.email} onChange={v => set('email', v)} onNext={next} email={form.email.address} />;
      case 'exito':      return <StepExito formData={form} />;
      default:           return null;
    }
  })();

  return (
    <div className={animClass} style={{ maxWidth: 1200, margin: '0 auto', boxShadow: '0 0 80px rgba(0,0,0,0.08)' }}>
      <FinalStepShell step={step} stepId={stepId} onContinue={next} continueLabel={continueLabel} continueDisabled={false}
        bodyMaxWidth={bodyMaxWidth} showFooter={stepId !== 'exito'}>
        {body}
      </FinalStepShell>
    </div>
  );
}

function FullscreenApp() {
  const [screen, setScreen] = React.useState('campania'); // 'campania' | 'landing' | 'loading' | 'flow' | 'flowfinal' | 'crm'
  const [transitioning, setTransitioning] = React.useState(false);
  const [flowKey, setFlowKey] = React.useState(0);
  const [userEmail, setUserEmail] = React.useState('juan.perez@gmail.com');
  const [userPhone, setUserPhone] = React.useState({ areaCode: '', number: '' });

  const handleSolicitar = (email, areaCode, number) => {
    if (email) setUserEmail(email);
    if (areaCode || number) setUserPhone({ areaCode: areaCode || '', number: number || '' });
    setScreen('loading');
  };

  const handleLoadingComplete = () => {
    setTransitioning(true);
    setTimeout(() => {
      setScreen('flowfinal');
      setTransitioning(false);
      setFlowKey(k => k + 1);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }, 100);
  };

  const handleShowDisapproved = () => {
    setTransitioning(true);
    setTimeout(() => {
      setScreen('disapproved');
      setTransitioning(false);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }, 300);
  };

  const handleBackToLanding = () => {
    setTransitioning(true);
    setTimeout(() => {
      setScreen('landing');
      setTransitioning(false);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }, 300);
  };

  return (
    <div style={{ minHeight: '100vh', position: 'relative' }}>
      {/* Loading overlay */}
      {screen === 'loading' && (
        <LoadingTransition onComplete={handleLoadingComplete} />
      )}

      {/* Navigation bar for demo control */}
      <div style={{
        position: 'fixed', bottom: 0, left: 0, right: 0, zIndex: 9999,
        background: 'rgba(15, 25, 35, 0.95)',
        backdropFilter: 'blur(12px)',
        borderTop: '1px solid rgba(255,255,255,0.1)',
        padding: '10px 24px',
        display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 12,
        fontFamily: "'Plus Jakarta Sans', sans-serif",
      }}>
        <span style={{ fontSize: 11, color: 'rgba(255,255,255,0.5)', fontWeight: 600, letterSpacing: '0.5px', textTransform: 'uppercase', marginRight: 8 }}>
          Aprisa — Mockup
        </span>
        {[
          { id: 'campania', label: 'Inicio Cliente · Campaña · PIP', icon: '📱' },
          { id: 'flowfinal', label: 'Flujo Final Aprisa', icon: '✅' },
          { id: 'landing', label: 'Landing', icon: '🏠' },
          { id: 'crm', label: 'CRM', icon: '🗂️' },
        ].map(({ id, label, icon }) => (
          <button
            key={id}
            onClick={() => {
              if (id === 'flowfinal') {
                setFlowKey(k => k + 1);
              }
              setTransitioning(true);
              setTimeout(() => {
                setScreen(id);
                setTransitioning(false);
                window.scrollTo({ top: 0, behavior: 'smooth' });
              }, 200);
            }}
            style={{
              padding: '7px 16px', borderRadius: 8,
              background: screen === id ? 'rgba(0,91,68,0.9)' : 'rgba(255,255,255,0.08)',
              color: screen === id ? '#fff' : 'rgba(255,255,255,0.7)',
              border: screen === id ? '1px solid rgba(0,91,68,1)' : '1px solid rgba(255,255,255,0.12)',
              fontSize: 12, fontWeight: 700,
              cursor: 'pointer',
              fontFamily: "'Plus Jakarta Sans', sans-serif",
              transition: 'all 0.2s',
              display: 'flex', alignItems: 'center', gap: 6,
            }}
          >
            <span>{icon}</span> {label}
          </button>
        ))}
      </div>

      {/* Content area */}
      <div style={{ paddingBottom: 56 }}>
        {/* CAMPAÑA / PIP */}
        {screen === 'campania' && (
          <div className="fade-in">
            <CampaignPip onGoToFinal={() => {
              setFlowKey(k => k + 1);
              setTransitioning(true);
              setTimeout(() => { setScreen('flowfinal'); setTransitioning(false); window.scrollTo({ top: 0, behavior: 'smooth' }); }, 200);
            }} />
          </div>
        )}

        {/* FLUJO FINAL APRISA */}
        {screen === 'flowfinal' && (
          <div className="fade-in">
            <FinalFlowViewer key={'ff' + flowKey} />
          </div>
        )}

        {/* LANDING */}
        {screen === 'landing' && (
          <div className="fade-in" style={{
            maxWidth: 1200, margin: '0 auto',
            boxShadow: '0 0 80px rgba(0,0,0,0.08)',
          }}>
            <AprisaLanding onSolicitar={handleSolicitar} showApi={false} />
          </div>
        )}

        {/* LOADING (shown as overlay, landing stays behind) */}
        {screen === 'loading' && (
          <div style={{ opacity: 0.3 }}>
            <div style={{ maxWidth: 1200, margin: '0 auto' }}>
              <AprisaLanding showApi={false} />
            </div>
          </div>
        )}

        {/* CRM — embebido en este mismo archivo (bloque #crm-doc), aislado en un iframe */}
        {screen === 'crm' && (
          <div className="fade-in" style={{ width: '100%', margin: '0 auto' }}>
            <iframe
              srcDoc={(typeof window !== 'undefined' && window.__CRM_HTML) || ''}
              title="Aprisa — CRM"
              style={{
                width: '100%', height: 'calc(100vh - 56px)',
                border: 'none', display: 'block', background: '#ECEFF3',
              }}
            />
          </div>
        )}

      </div>
    </div>
  );
}

function FullscreenFlowViewer({ userEmail = 'juan.perez@gmail.com', userPhone = { areaCode: '', number: '' } }) {
  const [stepId, setStepId] = React.useState('sms');
  const [animClass, setAnimClass] = React.useState('fade-in');
  const [showSimLoading, setShowSimLoading] = React.useState(false);
  const [form, setForm] = React.useState({
    smsCode: '',
    domicilio: { localidad: '', codigoPostal: '', calle: '', numero: '' },
    laboral: { sueldoNeto: '', antiguedad: '', empresa: '' },
    oferta: { monto: 500000, cuotas: 12 },
    email: { resent: false, validated: false, address: userEmail },
    identidad: {},
    fotos: { selfieNeutra: false, selfieSonriente: false, dniFrente: false, dniDorso: false },
    docs: { bonoSueldo: null, constanciaCBU: null },
    cbu: { cbu: '', alias: '', titularCuenta: '', banco: '' },
    acepta: { cesion: false, anexo: false, instrucciones: false, pagare: false, signed: false },
  });

  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const order = ['sms', 'domicilio', 'laboral', 'oferta', 'email', 'identidad', 'fotos', 'docs', 'cbu', 'firma', 'exito'];
  const idx = order.indexOf(stepId);

  const goToStep = (newStep) => {
    setAnimClass('page-exit');
    setTimeout(() => {
      setStepId(newStep);
      setAnimClass('page-enter');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }, 250);
  };

  const next = () => {
    if (stepId === 'laboral') { setShowSimLoading(true); return; }
    const nextStep = order[Math.min(idx + 1, order.length - 1)];
    goToStep(nextStep);
  };

  const prev = () => {
    if (idx > 0) {
      goToStep(order[idx - 1]);
    }
  };

  const canContinue = (() => {
    switch (stepId) {
      case 'sms':         return form.smsCode.length === 6;
      case 'domicilio':   return form.domicilio.localidad && form.domicilio.codigoPostal && form.domicilio.calle && form.domicilio.numero;
      case 'laboral':     return !!form.laboral.sueldoNeto && !!form.laboral.antiguedad && form.laboral.empresa.trim().length > 0;
      case 'oferta':      return Number(form.oferta.monto) > 0 && Number(form.oferta.cuotas) > 0;
      case 'email':       return !!form.email.validated;
      case 'identidad':   return true;
      case 'fotos':       return !!form.fotos.selfieNeutra && !!form.fotos.selfieSonriente && !!form.fotos.dniFrente && !!form.fotos.dniDorso;
      case 'docs':        return !!form.docs.bonoSueldo && !!form.docs.constanciaCBU;
      case 'cbu':         return form.cbu.cbu.length === 22 && form.cbu.titularCuenta.trim().length > 0;
      case 'firma':       return form.acepta.cesion && form.acepta.anexo && form.acepta.instrucciones && form.acepta.pagare && form.acepta.signed;
      default:            return true;
    }
  })();

  const continueLabel =
    stepId === 'firma'  ? 'Finalizar' :
    stepId === 'oferta' ? 'Solicitar este préstamo' :
    'Continuar';

  const displayStepId = stepId === 'fotos' ? 'identidad' : stepId;

  const body = (() => {
    switch (stepId) {
      case 'sms':         return <StepSMS value={form.smsCode} onChange={v => set('smsCode', v)} onSubmit={next} />;
      case 'domicilio':   return <StepDomicilio value={form.domicilio} onChange={v => set('domicilio', v)} />;
      case 'laboral':     return <StepLaboral value={form.laboral} onChange={v => set('laboral', v)} />;
      case 'oferta':      return <StepOferta value={form.oferta} onChange={v => set('oferta', v)} />;
      case 'email':       return <StepEmailValidacion value={form.email} onChange={v => set('email', v)} onNext={next} email={userEmail} />;
      case 'identidad':   return <StepIdentidad value={form.identidad} onChange={v => set('identidad', v)} />;
      case 'fotos':       return <StepFotos value={form.fotos} onChange={v => set('fotos', v)} />;
      case 'docs':        return <StepDocs value={form.docs} onChange={v => set('docs', v)} />;
      case 'cbu':         return <StepCBU formData={form.cbu} onChange={v => set('cbu', v)} />;
      case 'firma':       return <StepFirma value={form.acepta} onChange={v => set('acepta', v)} formData={form} nombreCompleto={form.cbu.titularCuenta || ''} />;
      case 'exito':       return <StepExito formData={form} />;
      default:            return null;
    }
  })();

  const bodyMaxWidth = (() => {
    switch (stepId) {
      case 'docs':        return 760;
      case 'oferta':      return 640;
      case 'cbu':         return 500;
      case 'identidad':   return 660;
      case 'fotos':       return 560;
      default:            return 560;
    }
  })();

  return (
    <div style={{ position: 'relative' }}>
      {showSimLoading && (
        <LoadingTransition
          duration={5000}
          title="Simulando tu préstamo"
          messages={[
            'Estamos simulando el monto y las cuotas de la préstamo que podemos darte...',
            'Analizando tu perfil y capacidad de pago...',
            'Preparando tu oferta personalizada...'
          ]}
          successTitle="¡Tu oferta está lista!"
          successSubtitle="Elegí monto y cuotas en el próximo paso"
          onComplete={() => {
            setShowSimLoading(false);
            const nextStep = order[Math.min(idx + 1, order.length - 1)];
            goToStep(nextStep);
          }}
        />
      )}
      {/* Step quick-nav for demo */}
      <div style={{
        position: 'sticky', top: 0, zIndex: 50,
        background: 'rgba(244,251,248,0.95)',
        backdropFilter: 'blur(8px)',
        borderBottom: '1px solid rgba(0,0,0,0.06)',
        padding: '8px 16px',
        display: 'flex', alignItems: 'center', gap: 6,
        overflowX: 'auto',
      }}>
        <span style={{ fontSize: 10, color: '#6B7280', fontWeight: 700, letterSpacing: '0.5px', textTransform: 'uppercase', marginRight: 4, whiteSpace: 'nowrap' }}>
          Ir a paso:
        </span>
        {order.map((s, i) => (
          <button
            key={s}
            onClick={() => goToStep(s)}
            style={{
              padding: '4px 10px', borderRadius: 6,
              background: stepId === s ? '#005B44' : 'rgba(0,0,0,0.04)',
              color: stepId === s ? '#fff' : '#6B7280',
              border: 'none',
              fontSize: 11, fontWeight: 700,
              cursor: 'pointer',
              fontFamily: "'Plus Jakarta Sans', sans-serif",
              whiteSpace: 'nowrap',
              transition: 'all 0.15s',
            }}
          >
            {i + 1}. {FLOW_STEPS.find(fs => fs.id === s)?.label || s}
          </button>
        ))}
      </div>

      {/* Animated step content */}
      <div key={stepId} className={animClass}>
        <StepShell
          stepId={displayStepId}
          onContinue={next}
          continueLabel={continueLabel}
          continueDisabled={!canContinue}
          bodyMaxWidth={bodyMaxWidth}
          showFooter={stepId !== 'exito' && stepId !== 'email'}
          subtitleOverride={stepId === 'sms' ? maskedPhoneSubtitle(userPhone) : undefined}
        >
          {body}
        </StepShell>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<FullscreenApp />);
</script>

</body>
