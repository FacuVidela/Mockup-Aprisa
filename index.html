<style>
  html, body {
    margin: 0; padding: 0;
    background: linear-gradient(160deg, #F1FAF3 0%, #E6F4E9 30%, #D6EDDC 60%, #F2FAF4 100%);
    font-family: 'Plus Jakarta Sans', sans-serif;
    overflow-x: hidden;
    min-height: 100vh;
  }
  * { box-sizing: border-box; }

  /* Smooth page transitions */
  .page-enter {
    animation: pageSlideIn 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }
  .page-exit {
    animation: pageSlideOut 0.3s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }
  @keyframes pageSlideIn {
    from { opacity: 0; transform: translateX(30px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes pageSlideOut {
    from { opacity: 1; transform: translateX(0); }
    to   { opacity: 0; transform: translateX(-30px); }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .fade-in {
    animation: fadeIn 0.5s ease-out forwards;
  }

  /* Scrollbar styling */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.25); }
  /* ============================================================
     MOBILE RESPONSIVE OVERRIDES — adapt 1200px design to phones
     ============================================================ */
  html, body { overflow-x: hidden; max-width: 100vw; }
  * { -webkit-tap-highlight-color: rgba(0,0,0,0.05); }

  @media (max-width: 800px) {
    body { -webkit-text-size-adjust: 100%; }

    /* === Force every hardcoded 1200px-wide container to fit the viewport === */
    div[style*="width: 1200"],
    div[style*="width:1200"],
    div[style*="min-width: 1200"] {
      width: 100% !important;
      max-width: 100vw !important;
      min-width: 0 !important;
    }

    /* === Fullscreen demo wrappers === */
    div[style*="max-width: 1200px"] { max-width: 100vw !important; box-shadow: none !important; }

    /* === Tighten large horizontal paddings (60px / 40px → 16-20px) === */
    /* React serializes inline-style strings WITHOUT quotes, so we match raw values */
    div[style*="padding: 60px"] { padding: 24px 16px !important; }
    div[style*="padding: 24px 60px"]  { padding: 16px !important; }
    div[style*="padding: 22px 60px"] { padding: 14px 16px !important; }
    div[style*="padding: 28px 60px 40px"] { padding: 16px 12px !important; }
    div[style*="padding: 60px 60px 0"] { padding: 28px 16px 0 !important; }
    div[style*="padding: 40px 60px"]     { padding: 20px 16px !important; }
    div[style*="padding: 60px 60px 40px"]{ padding: 24px 16px !important; }
    div[style*="padding: 40px"] { padding: 22px 18px !important; }
    div[style*="padding: 36px 40px 16px"] { padding: 24px 14px 10px !important; }
    div[style*="padding: 16px 40px 28px"] { padding: 12px 14px 20px !important; }
    div[style*="padding: 18px 40px 28px"] { padding: 14px 14px 18px !important; }
    div[style*="padding: 28px 60px"]      { padding: 16px !important; }
    /* === StepShell compacto (paddings nuevos) → laterales chicos en mobile === */
    div[style*="padding: 14px 60px 10px"] { padding: 12px 14px 8px !important; }   /* header */
    div[style*="padding: 14px 60px 20px"] { padding: 10px 12px 16px !important; }  /* card wrapper */
    div[style*="padding: 14px 60px"]      { padding: 14px 16px !important; }       /* footer inferior */
    div[style*="padding: 20px 40px 8px"]  { padding: 16px 16px 6px !important; }   /* title block */
    div[style*="padding: 6px 40px 16px"]  { padding: 6px 14px 14px !important; }   /* body */
    div[style*="padding: 14px 40px 18px"] { padding: 12px 14px 16px !important; }  /* CTA footer */
    div[style*="padding: 14px 18px"] { /* keep */ }

    /* === Hero title: shrink "Convertí tus cheques en plata hoy." === */
    h1 {
      font-size: 34px !important;
      letter-spacing: -1px !important;
      line-height: 1.08 !important;
    }
    p { font-size: 15px !important; line-height: 1.45 !important; }

    /* === Títulos del Flujo Final: tamaño propio (la regla global de h1 los inflaba a 34px y se veían apretados) === */
    h1.flow-step-title {
      font-size: 21px !important;
      letter-spacing: -0.4px !important;
      line-height: 1.2 !important;
      margin: 0 0 6px !important;
      word-break: normal !important;
      hyphens: none !important;
    }
    p.flow-step-sub {
      font-size: 13.5px !important;
      line-height: 1.4 !important;
      padding: 0 4px !important;
    }
    /* Un poco más de aire en el bloque de título de cada paso */
    div[style*="padding: 20px 40px 8px"] { padding: 18px 18px 8px !important; }

    /* Big hero numbers (48 hs, MAV, SGR) cards */
    div[style*="font-size: 24px"][style*="font-weight: 900"] { font-size: 22px !important; }
    div[style*="font-size: 32px"] { font-size: 26px !important; }

    /* === Two-column grids → single column === */
    div[style*="grid-template-columns: 1fr 1fr"],
    div[style*="grid-template-columns: 1.2fr 1fr"],
    div[style*="grid-template-columns: 'repeat(2"],
    div[style*="grid-template-columns: repeat(2, 1fr)"] {
      grid-template-columns: 1fr !important;
    }
    div[style*="grid-template-columns: repeat(3, 1fr)"] {
      grid-template-columns: 1fr !important;
      gap: 12px !important;
    }

    /* === Stack flex rows with gap: 14 / 10 (form rows) on mobile === */
    div[style*="display: flex"][style*="gap: 14"]:not([style*="align-items: center"]):not([style*="flex-direction: column"]) {
      flex-wrap: wrap !important;
    }
    /* CUIT + Email row uses inline-styled wrapper divs each with flex: 1 — already wraps with the rule above */

    /* === Step progress bar in StepShell: hide labels, shrink === */
    /* Labels: small bold text with whiteSpace nowrap that follow the circles */
    div[style*="white-space: nowrap"][style*="font-size: 11px"] {
      display: none !important;
    }
    /* Step columns minWidth 80 → narrower */
    div[style*="min-width: 80px"] { min-width: 0 !important; flex: 1 !important; }

    /* Reduce the step circle size on mobile */
    div[style*="width: 30px"][style*="height: 30px"][style*="border-radius: 999"] {
      width: 24px !important;
      height: 24px !important;
      font-size: 11px !important;
    }

    /* === StepShell connector lines: thinner === */
    div[style*="margin-top: -22px"][style*="height: 2px"] {
      margin-top: -16px !important;
    }

    /* === "IR A PASO" sticky quick-nav (top of flow): allow horizontal scroll, smaller buttons === */
    div[style*="position: sticky"][style*="top: 0"] {
      padding: 6px 10px !important;
    }
    div[style*="position: sticky"][style*="top: 0"] button {
      padding: 4px 8px !important;
      font-size: 10px !important;
    }

    /* === Demo nav at bottom: wrap, smaller === */
    div[style*="position: fixed"][style*="bottom: 0"][style*="rgba(15, 25, 35"] {
      padding: 8px 10px !important;
      flex-wrap: wrap !important;
      gap: 6px !important;
    }
    div[style*="position: fixed"][style*="bottom: 0"] button {
      padding: 6px 12px !important;
      font-size: 11px !important;
    }

    /* === Inputs in landing: larger touch targets, full width === */
    input, select, textarea {
      font-size: 16px !important;   /* prevents iOS auto-zoom */
      height: auto !important;
      min-height: 48px !important;
    }

    /* === Hero feature cards (48hs / MAV / SGR) padding === */
    div[style*="padding: 20px"] { padding: 16px !important; }

    /* === FAQ + sections === */
    div[style*="padding: 50px 60px"] { padding: 24px 16px !important; }
    div[style*="padding: 40px 60px 30px"] { padding: 20px 16px 14px !important; }

    /* === Landing / Step footer: stack (React serializa rgba con espacios) === */
    div[style*="border-top: 1px solid rgba(0,0,0,0.08)"][style*="display: flex"][style*="justify-content: space-between"],
    div[style*="border-top: 1px solid rgba(0, 0, 0, 0.08)"][style*="justify-content: space-between"] {
      flex-direction: column !important;
      gap: 12px !important;
      text-align: center !important;
      padding: 22px 16px !important;
    }

    /* === SMS code input boxes: smaller spacing + smaller boxes === */
    div[style*="display: flex"][style*="gap: 8"][style*="justify-content: center"] { gap: 4px !important; }
    input[style*="width: 58px"][style*="height: 72px"],
    input[style*="width:58px"][style*="height:72px"] {
      width: 44px !important;
      height: 56px !important;
      font-size: 22px !important;
    }
    /* Also the placeholder/decoration boxes for SMS */
    div[style*="width: 58px"][style*="height: 72px"] {
      width: 44px !important;
      height: 56px !important;
    }

    /* === Tablero de pasos en flujo: que el contenedor pueda hacer scroll si hace falta === */
    div[style*="display: flex"][style*="align-items: center"][style*="width: 100%"][style*="gap: 0"] {
      overflow-x: auto !important;
      -webkit-overflow-scrolling: touch !important;
    }

    /* === Body card padding === */
    div[style*="background: #fff"][style*="border-radius: 24px"] {
      border-radius: 16px !important;
    }

    /* === Bullet feature cards on landing === */
    div[style*="border-radius: 16px"][style*="padding: 24px"],
    div[style*="border-radius: 16px"][style*="padding: 28px"] {
      padding: 18px !important;
    }

    /* === Provincia field row + Email field row stack on mobile === */
    /* Generic: any flex row inside the landing card with two flex:1 children */
    div[style*="display: flex"][style*="gap: 14"][style*="align-items: flex-start"] {
      flex-direction: column !important;
    }
    div[style*="display: flex"][style*="gap: 14"][style*="align-items: flex-start"] > div[style*="flex: 1"] {
      width: 100% !important;
    }

    /* === Cheque image upload / preview cards: shrink === */
    div[style*="aspect-ratio: 3 / 4"],
    div[style*="aspect-ratio: 3/4"] { max-width: 280px !important; margin: 0 auto !important; }

    /* === Camera viewfinder in fotos step: full width === */
    div[style*="border-radius: 18px"][style*="overflow: hidden"][style*="height: 550px"] {
      height: 380px !important;
    }

    /* === Resumen / simulación cards: tighter === */
    div[style*="padding: 24px"][style*="border-radius: 16"] { padding: 18px !important; }

    /* === Documents list cards: stack rows === */
    div[style*="display: grid"][style*="grid-template-columns: repeat(2"] {
      grid-template-columns: 1fr !important;
    }

    /* === Make all buttons full-width-ish for thumb reach === */
    button[style*="border-radius: 14px"][style*="padding: 16px"] {
      padding: 14px 18px !important;
      font-size: 14px !important;
    }
  }

  /* On very narrow phones (<400px), even tighter */
  @media (max-width: 400px) {
    h1 { font-size: 28px !important; }
    input[style*="width: 58px"][style*="height: 72px"] {
      width: 38px !important;
      height: 50px !important;
      font-size: 20px !important;
    }
  }
</style>

<script type="text/html" id="crm-doc">
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Aprisa — CRM de Solicitudes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --accent:#0EA478; --accent-dark:#0A7E5C; --accent-soft:#DCF4EC;
    --primary:#1A2B4A; --primary-dark:#0F1B30;
    --ink:#0F1923; --muted:#5B6B7A; --line:#E3E8EF; --line-soft:#EEF1F5;
    --bg:#ECEFF3; --header-link:#1A6FB5;
    --danger:#D93838; --danger-soft:#FCEBEB; --warn:#C77D12; --warn-soft:#FBF1DF;
    --ok:#1F9D55; --ok-soft:#E7F6EE; --info:#2B6FB8; --info-soft:#E6F0FA;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);font-family:'Plus Jakarta Sans',sans-serif;color:var(--ink);overflow-x:hidden;max-width:100vw;}
  a{color:inherit;text-decoration:none;}
  ::-webkit-scrollbar{width:9px;height:9px;}
  ::-webkit-scrollbar-thumb{background:rgba(0,0,0,.18);border-radius:6px;}
  ::-webkit-scrollbar-track{background:transparent;}

  /* ===== HEADER ===== */
  header.topbar{
    background:#fff;border-bottom:1px solid var(--line);
    height:70px;display:flex;align-items:center;justify-content:space-between;
    padding:0 28px;position:sticky;top:0;z-index:40;
    box-shadow:0 1px 4px rgba(0,0,0,.04);
  }
  .brand{display:flex;align-items:center;gap:12px;}
  .brand .wm{display:flex;flex-direction:column;line-height:1;}
  .brand .wm .name{font-size:26px;font-weight:800;letter-spacing:-1px;color:var(--primary);}
  .brand .wm .name span{color:var(--accent);}
  .brand .wm .tag{font-size:9.5px;font-weight:700;letter-spacing:1.6px;color:var(--muted);text-transform:uppercase;margin-top:3px;}
  .topright{display:flex;align-items:center;gap:22px;}
  .msg-btn{position:relative;color:var(--muted);cursor:pointer;}
  .msg-btn .badge{position:absolute;top:-7px;right:-8px;background:var(--danger);color:#fff;font-size:10px;font-weight:800;
    min-width:18px;height:18px;border-radius:999px;display:flex;align-items:center;justify-content:center;padding:0 4px;}
  .user{display:flex;align-items:center;gap:10px;cursor:pointer;color:var(--muted);font-weight:600;font-size:15px;}
  .user .avatar{width:34px;height:34px;border-radius:999px;background:var(--accent-soft);
    display:flex;align-items:center;justify-content:center;color:var(--accent-dark);}
  .caret{border:solid var(--muted);border-width:0 2px 2px 0;display:inline-block;padding:3px;transform:rotate(45deg);margin-top:-3px;}

  /* ===== SUBNAV ===== */
  .subnav{background:#fff;border-bottom:1px solid var(--line);display:flex;justify-content:center;gap:46px;padding:10px 0;}
  .subnav a{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:12.5px;font-weight:700;color:var(--muted);cursor:pointer;}
  .subnav a.active{color:var(--accent);}
  .subnav a.disabled{opacity:.5;cursor:default;pointer-events:none;}
  .subnav a svg{width:24px;height:24px;}

  /* ===== TITLE BAND ===== */
  .titleband{background:#E4E8EC;padding:26px 38px;}
  .titleband h1{margin:0;font-size:34px;font-weight:400;color:#5a6470;letter-spacing:-.5px;}

  /* ===== CARD / TABLE ===== */
  .wrap{padding:20px 28px 60px;}
  .card{background:#fff;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.06),0 8px 30px -16px rgba(0,0,0,.18);padding:18px 22px 26px;}
  .toolbar{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:6px;}
  .card-title{margin:0;font-size:26px;font-weight:800;color:var(--primary);letter-spacing:-.6px;}
  .search{display:flex;gap:8px;}
  .search input{border:1px solid var(--line);border-radius:7px;padding:9px 14px;font-size:14px;width:260px;font-family:inherit;outline:none;}
  .search input:focus{border-color:var(--accent);}
  .btn{background:var(--accent);color:#fff;border:none;border-radius:7px;padding:9px 18px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
  .btn:hover{background:var(--accent-dark);}
  .btn-out{background:#fff;color:var(--accent);border:1px solid var(--accent);}
  .btn-out:hover{background:var(--accent-soft);}
  .filters-toggle{text-align:right;color:var(--accent);font-weight:700;font-size:13.5px;margin:8px 2px 14px;cursor:pointer;user-select:none;}
  .filters{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:18px;}
  .filters select{flex:1;min-width:150px;border:1px solid var(--line);border-radius:7px;padding:10px 12px;font-size:13.5px;color:var(--muted);font-family:inherit;background:#fff;outline:none;}
  .filters select:focus{border-color:var(--accent);}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  thead th{color:var(--header-link);font-weight:800;text-align:left;padding:12px 10px;border-bottom:2px solid var(--line-soft);white-space:nowrap;font-size:12.5px;}
  tbody td{padding:14px 10px;border-bottom:1px solid var(--line-soft);vertical-align:middle;color:#37414d;}
  tbody tr:hover{background:#F7FAFC;}
  .nm{font-weight:700;color:var(--ink);max-width:130px;}
  .mono{font-variant-numeric:tabular-nums;}

  /* progreso pill */
  .prog{position:relative;width:78px;height:22px;border-radius:999px;background:#E3E7EB;overflow:hidden;}
  .prog .fill{position:absolute;inset:0;border-radius:999px;background:var(--accent);}
  .prog .txt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;z-index:2;}
  .prog.low .fill{background:#9aa6b2;}

  .score{font-weight:800;color:var(--accent-dark);}

  /* estado badge */
  .est{display:inline-block;font-weight:700;font-size:12px;line-height:1.25;}
  .est.nuevo{color:#37414d;}
  .est.revision{color:var(--info);}
  .est.validacion{color:var(--warn);}
  .est.esperando{color:#7B3FA0;}
  .est.finalizado{color:var(--ok);}
  .est.rech{color:var(--danger);}
  .est.anal{color:var(--warn);}
  .est.aprob{color:var(--ok);}

  /* forms badges (BCRA / Veraz) */
  .forms2{display:flex;flex-direction:column;gap:5px;}
  .forms2 .fb2{padding:4px 10px;border-radius:6px;font-size:10.5px;font-weight:800;text-align:center;letter-spacing:.4px;background:#D7DDE3;color:#7d8794;min-width:56px;}
  .forms2 .fb2.on{background:var(--accent);color:#fff;}

  /* actions */
  .acts{display:flex;gap:11px;align-items:center;}
  .acts .ic{width:19px;height:19px;color:var(--info);cursor:pointer;}
  .acts .ic:hover{color:var(--accent);}
  .acts .ic.coins{color:var(--accent-dark);}

  .digital-dot{width:11px;height:11px;border-radius:999px;background:var(--accent);display:inline-block;}

  /* ===== MODAL ===== */
  .overlay{position:fixed;inset:0;background:rgba(20,28,40,.55);backdrop-filter:blur(2px);z-index:100;display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto;}
  .overlay.open{display:flex;}
  .modal{background:#fff;border-radius:12px;width:100%;max-width:760px;box-shadow:0 30px 80px -20px rgba(0,0,0,.5);animation:pop .22s ease-out;}
  @keyframes pop{from{opacity:0;transform:translateY(14px) scale(.98);}to{opacity:1;transform:none;}}
  .modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#fff;border-radius:12px 12px 0 0;}
  .modal-head h3{margin:0;font-size:20px;font-weight:800;color:var(--primary);}
  .modal-head .x{cursor:pointer;color:var(--muted);font-size:26px;line-height:1;background:none;border:none;}
  .btn-legajo{display:inline-flex;align-items:center;gap:7px;background:var(--accent);color:#fff;border:none;border-radius:8px;
    padding:8px 14px;font-size:12.5px;font-weight:800;cursor:pointer;font-family:inherit;letter-spacing:.2px;
    box-shadow:0 2px 8px -2px rgba(0,91,68,.55);transition:background .15s;}
  .btn-legajo:hover{background:var(--accent-dark);}
  .modal-body{padding:22px 24px 28px;}

  /* resumen modal */
  .res-hero{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;padding:18px 20px;border-radius:12px;background:linear-gradient(135deg,var(--accent-soft),#eef7f3);border:1px solid #cfeadd;margin-bottom:20px;}
  .res-hero .rh-name{font-size:22px;font-weight:800;color:var(--primary);letter-spacing:-.4px;}
  .res-hero .rh-sub{font-size:13px;color:var(--muted);font-weight:600;margin-top:3px;}
  .res-hero .rh-amount{text-align:right;}
  .res-hero .rh-amount .big{font-size:30px;font-weight:800;color:var(--accent-dark);letter-spacing:-1px;}
  .res-hero .rh-amount .lbl{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
  .pill{display:inline-block;padding:4px 11px;border-radius:999px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;}
  .pill.nuevo{background:#ECEEF0;color:#37414d;}
  .pill.revision{background:var(--info-soft);color:var(--info);}
  .pill.validacion{background:var(--warn-soft);color:var(--warn);}
  .pill.esperando{background:#F3E8FA;color:#7B3FA0;}
  .pill.finalizado{background:var(--ok-soft);color:var(--ok);}
  .pill.ok{background:var(--ok-soft);color:var(--ok);}
  .pill.rech{background:var(--danger-soft);color:var(--danger);}
  .pill.anal{background:var(--warn-soft);color:var(--warn);}

  .res-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;}

  .plt-st-bad{color:var(--danger);font-weight:900;font-size:15px;}

// ---------- Render tabla ----------
function progClass(p){ return p>=40 ? '' : 'low'; }

function rowHtml(d, idx){
  const bcraOn = d.score ? 'on' : '';
  const verazOn = d.veraz ? 'on' : '';
  const forms = `<div class="forms2"><div class="fb2 ${bcraOn}">BCRA</div><div class="fb2 ${verazOn}">Veraz</div></div>`;
  const prog = `<div class="prog ${progClass(d.prog)}"><div class="fill" style="width:${d.prog}%"></div><div class="txt">${d.prog}%</div></div>`;
  return `<tr>
    <td>${prog}</td>
    <td>${d.veraz?`<span class="mono">${d.veraz}</span>`:'—'}</td>
    <td><span class="est ${d.cls}">${d.estado}</span></td>
    <td class="mono">${d.fecha}</td>
    <td class="nm">${d.nombre}</td>
    <td class="mono">${d.doc}</td>
    <td>${d.vendedor||'—'}</td>
    <td class="mono">${d.cel}</td>
    <td class="mono">${ARS(d.monto)}</td>
    <td>${d.prov}</td>
    <td>${d.loc||'—'}</td>
    <td>${forms}</td>
    <td>
      <div class="acts">
        <span title="Editar solicitud" onclick="openEditar(${idx})">${I.pencil}</span>${I.wa}
        <span title="Ver pasos" onclick="openPasos(${idx})">${I.coins}</span>
        <span title="Ver plantillas de validación" onclick="openPlantillas(${idx})">${I.tpl}</span>
      </div>
      ${['nuevo','revision'].includes(d.cls)
        ? `<button onclick="openOferta(${idx})" style="margin-top:5px;font-size:10px;font-weight:700;padding:3px 9px;border-radius:6px;border:1px solid #D1D5DB;cursor:pointer;background:#F3F4F6;color:#6B7280;white-space:nowrap;font-family:inherit">Carga de datos</button>`
        : `<button disabled style="margin-top:5px;font-size:10px;font-weight:700;padding:3px 9px;border-radius:6px;border:1px solid #86EFAC;cursor:default;background:#D1FAE5;color:#065F46;white-space:nowrap;font-family:inherit">✓ Cargado</button>`
      }
    </td>
  </tr>`;
}

function render(filter=''){
  const f = filter.trim().toLowerCase();
  const html = LEADS.map((d,i)=>({d,i}))
    .filter(({d})=> !f || (d.nombre.toLowerCase().includes(f)||d.doc.includes(f)||d.prov.toLowerCase().includes(f)||d.loc.toLowerCase().includes(f)))
    .map(({d,i})=>rowHtml(d,i)).join('');
  document.getElementById('rows').innerHTML = html || `<tr><td colspan="13" style="text-align:center;padding:30px;color:#8b97a3">Sin resultados</td></tr>`;
}
// Orden: Nuevo primero, Finalizado último (por progreso ascendente)
LEADS.sort((a,b)=>{
  const af = a.completo?1:0, bf = b.completo?1:0;
  if(af!==bf) return af-bf;
  return a.prog - b.prog;
});

// ---------- Modal Pasos ----------
function openPasos(idx){
  const d = LEADS[idx];
  const pasos = d.completo ? pasosCompletos(d) : (d.pasos||[]);
  let html='';
  if(!pasos.length){
    html = `<div style="text-align:center;color:#8b97a3;padding:30px 10px;">Este lead todavía no inició el flujo de solicitud.</div>`;
  } else {
    html = pasos.map(p=>stepHtml(p)).join('');
  }
  document.getElementById('pasosBody').innerHTML = html;
  show('modalPasos');
}

function stepHtml(p){
  let inner = (p.campos||[]).map(([k,v])=>`<div class="f"><span class="fk">${k}:</span><span class="fv">${v}</span></div>`).join('');
  if(p.badge){
    const bcls = /Rechaz/i.test(p.badge) ? 'style="background:var(--danger-soft);color:var(--danger)"' : '';
    inner += `<div style="margin-top:10px"><span class="badge-ok" ${bcls}>${/Rechaz/i.test(p.badge)?'✕':'✓'} ${p.badge}</span></div>`;
  }
  if(p.fotos){
    inner += `<div class="photos">` + p.fotos.map(([cap,fn])=>`
      <div style="text-align:center">
        <div class="thumb">${I.cam}<span class="cap">${cap}</span></div>
        <div style="font-size:10px;color:var(--accent);font-weight:700;margin-top:4px;cursor:pointer">${fn}</div>
      </div>`).join('') + `</div>`;
  }
  if(p.adjuntos){
    inner += `<div class="atts">` + p.adjuntos.map(([nm,fn,tp])=>attHtml(nm,fn,tp)).join('') + `</div>`;
  }
  if(p.contratos){
    inner += `<div style="font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:14px 0 8px">Documentos firmados</div>`;
    inner += `<div class="atts">` + p.contratos.map(([nm,fn])=>attHtml(nm,fn,'pdf',true)).join('') + `</div>`;
  }
  return `<div class="step">
    <div class="sh">
      <div class="st"><span class="num">${p.n}</span>${p.t}</div>
      <div class="sd">${p.fecha} ${I.lock}</div>
    </div>
    <div class="sb">${inner||'<span style="color:#8b97a3">Paso completado.</span>'}</div>
  </div>`;
}
function attHtml(nm,fn,tp,signed){
  const fi = tp==='pdf'?'<span class="fi pdf">'+I.pdf+'</span>':'<span class="fi img">'+I.img+'</span>';
  return `<div class="att">${fi}<div class="meta"><div class="fn">${nm}${signed?' <span style="color:var(--ok);font-size:10px">✓ firmado</span>':''}</div><div class="dl">${fn} · Descargar</div></div></div>`;
}

// Shared types and tokens for the Aprisa flow
// Brand: Aprisa — Préstamos Personales · Préstamos para clientes (Argentina)

/** @typedef {'sms'|'domicilio'|'laboral'|'oferta'|'docs'|'cbu'|'firma'|'exito'} StepId */

const FLOW_STEPS = [
  { id: 'sms',          label: 'SMS',                 title: 'Verificá tu número',          subtitle: 'Te enviamos un código por SMS a tu celular' },
  { id: 'domicilio',    label: 'Domicilio',           title: '¿Dónde vivís?',                subtitle: 'Necesitamos tu dirección para conocerte' },

  { id: 'email',        label: 'Email',               title: 'Validá tu email',              subtitle: 'Te enviamos un mail para confirmar tu identidad digital' },

  { id: 'cbu',          label: 'CBU',                 title: 'Ingresá tu CBU',               subtitle: 'Acreditaremos el monto de la préstamo en esta cuenta' },
  { id: 'firma',        label: 'Firma',               title: 'Firma electrónica',            subtitle: 'Leé y aceptá los documentos para formalizar' },
  { id: 'exito',        label: 'Listo',               title: '¡Felicitaciones!',             subtitle: 'Tu solicitud fue aprobada' },
];

// Aprisa brand palette
// Modern mutual-finance look: deep navy primary + fresh emerald accent (growth / money).
// All these are also exposed in window.__undiezBrand so the Tweaks panel can override at runtime.
const UNDIEZ_BRAND_DEFAULT = {
  primary:     '#14401C',   // deep navy — brand ink / emblem text
  primaryDark: '#08220C',
  primarySoft: '#E6F4E9',
  accent:      '#005B44',   // emerald — CTA, highlight, success
  accentDark:  '#003D2E',
  accentSoft:  '#D6EDE7',
  // Header gradient stops
  headerFrom:  '#F1FAF3',
  headerThru:  '#E6F4E9',
  headerTo:    '#D6EDDC',
};

// expose so the logo + downstream can read it
if (typeof window !== 'undefined' && !window.__undiezBrand) {
  window.__undiezBrand = { ...UNDIEZ_BRAND_DEFAULT };
}

const _b = (typeof window !== 'undefined' && window.__undiezBrand) || UNDIEZ_BRAND_DEFAULT;

const TOKENS = {
  FONT: "'Plus Jakarta Sans', sans-serif",
  // Legacy 'green' keys — now mapped to the Aprisa accent so the existing
  // call-sites that pass `green={green}` keep working without touching every file.
  yellow:     _b.accent,
  yellowDark: _b.accentDark,
  green:      _b.accent,
  greenDark:  _b.accentDark,
  greenSoft:  _b.accentSoft,
  // Brand
  accent:     _b.accent,

  accentSoft: _b.accentSoft,
  primary:     _b.primary,

// Build masked phone subtitle: "+54 9 299 •••• 78"
// Shows area code + last 2 digits of number, rest masked
function maskedPhoneSubtitle({ areaCode, number }) {
  if (!areaCode && !number) return undefined;
  const num = number || '';

function UnDiezField({
  label, placeholder, apiKey, showApi, green, line,
  width = '100%', noLabel = false, asSelect = false, options = [],
  value, onChange, hasError = false,
}) {
  const handleChange = (e) => { if (onChange) onChange(e.target.value); };
  const borderColor = hasError ? '#D93025' : line;
  const bgColor     = hasError ? '#FFF5F5' : '#F7F9FC';
  const commonStyle = {
    border: `1.5px solid ${borderColor}`, borderRadius: 12,
    height: 50, padding: '0 16px',
    background: bgColor,
    fontSize: 14, fontWeight: 500, color: '#17181A',
    fontFamily: "'Plus Jakarta Sans', sans-serif",
    outline: 'none', width: '100%',
  };
  return (
    <div style={{ width, display: 'flex', flexDirection: 'column', gap: 8 }}>
      {!noLabel && (
        <div style={{
          display: 'flex', alignItems: 'baseline', gap: 6,

              background: '#EAF6EE', padding: '1px 6px', borderRadius: 4,
            }}>→ {apiKey}</span>
          )}
        </div>
      )}
      {asSelect ? (
        <select
          value={value || ''}
          onChange={handleChange}
          style={{
            ...commonStyle,
            color: value ? '#17181A' : '#9AA3AD',
            appearance: 'none',
            backgroundImage: `url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 10 10'><path d='M1 3l4 4 4-4' stroke='%239BA3AA' stroke-width='1.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>")`,
            backgroundRepeat: 'no-repeat',
            backgroundPosition: 'right 16px center',
            paddingRight: 36,
          }}
          onFocus={(e) => { e.currentTarget.style.borderColor = green; }}
          onBlur={(e) => { e.currentTarget.style.borderColor = line; }}
        >
          <option value="" disabled>{placeholder}</option>
          {options.map((opt) => (
            <option key={opt} value={opt} style={{ color: '#17181A' }}>{opt}</option>

        <input

          onFocus={(e) => { e.currentTarget.style.borderColor = green; }}
          onBlur={(e) => { e.currentTarget.style.borderColor = line; }}

}

// StepShell — shared frame for every step: header (logo + progress) + white card with content

function StepProgress({ stepId, darkBg = false }) {
  const { yellow, green, ink, muted, line, primary } = TOKENS;
  const labelDone = darkBg ? '#fff' : ink;
  const labelPending = darkBg ? '#7E8EA3' : muted;
  const stepBg = darkBg ? 'rgba(255,255,255,0.08)' : '#fff';
  const stepBorderPending = darkBg ? 'rgba(255,255,255,0.2)' : line;
  const stepConnectorPending = darkBg ? 'rgba(255,255,255,0.15)' : line;
  const activeBg = darkBg ? '#fff' : '#fff';
  const activeBorder = darkBg ? '#fff' : primary;
  const activeRing = darkBg ? 'rgba(255,255,255,0.18)' : 'rgba(0,91,68,0.18)';
  const steps = FLOW_STEPS.filter((s) => s.id !== 'fotos' && s.id !== 'exito');
  const currentIndex = stepId === 'exito' ? steps.length : steps.findIndex((s) => s.id === stepId);

  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 0, width: '100%' }}>
      {steps.map((s, i) => {
        const done = i < currentIndex;
        const active = i === currentIndex;
        const pending = i > currentIndex;
        return (
          <React.Fragment key={s.id}>
            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8, minWidth: 80 }}>
              <div style={{
                width: 30, height: 30, borderRadius: 999,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontSize: 13, fontWeight: 800,
                background: done ? green : active ? activeBg : stepBg,
                color: done ? '#fff' : active ? primary : labelPending,
                border: done ? `2px solid ${green}` : active ? `2px solid ${activeBorder}` : `1.5px solid ${stepBorderPending}`,
                transition: 'all .2s',
                boxShadow: active ? `0 0 0 4px ${activeRing}` : 'none'
              }}>
                {done ?
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                    <path d="M2.5 7.5 L5.5 10.5 L11.5 3.5" stroke="#fff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
                  </svg> :
                i + 1}
              </div>
              <div style={{
                fontSize: 11, fontWeight: 700, letterSpacing: '-0.1px',
                color: pending ? labelPending : labelDone,
                whiteSpace: 'nowrap'
              }}>{s.label}</div>
            </div>
            {i < steps.length - 1 &&
            <div style={{
              flex: 1, height: 2, marginTop: -22,
              background: done ? green : stepConnectorPending,
              borderRadius: 2,
              transition: 'background .2s'
            }} />
            }
          </React.Fragment>);

      })}
    </div>);

}

<script type="text/babel" data-source="StepSMS.jsx">
// Step 1 — SMS verification: 6 separate inputs + 60s resend countdown

function StepSMS({ value = '', onChange, onSubmit }) {
  const { FONT, ink, muted, line, yellow, yellowDark, green, greenSoft } = TOKENS;
  const [digits, setDigits] = React.useState(() => {
    const arr = Array(6).fill('');
    for (let i = 0; i < Math.min(6, value.length); i++) arr[i] = value[i];
    return arr;
  });
  const [seconds, setSeconds] = React.useState(60);
  const [resent, setResent] = React.useState(0);
  const refs = React.useRef([]);

  React.useEffect(() => {
    if (seconds <= 0) return;
    const t = setTimeout(() => setSeconds((s) => s - 1), 1000);
    return () => clearTimeout(t);
  }, [seconds]);

  React.useEffect(() => {
    onChange && onChange(digits.join(''));
  }, [digits]);

  const setDigit = (i, v) => {
    const clean = (v || '').replace(/\D/g, '').slice(-1);
    const next = [...digits];
    next[i] = clean;
    setDigits(next);
    if (clean && i < 5) refs.current[i + 1]?.focus();
  };

  const onKeyDown = (i, e) => {
    if (e.key === 'Backspace' && !digits[i] && i > 0) {
      refs.current[i - 1]?.focus();
    } else if (e.key === 'ArrowLeft' && i > 0) {
      refs.current[i - 1]?.focus();
    } else if (e.key === 'ArrowRight' && i < 5) {
      refs.current[i + 1]?.focus();
    } else if (e.key === 'Enter') {
      onSubmit && onSubmit();
    }
  };

  const onPaste = (e) => {
    const pasted = (e.clipboardData.getData('text') || '').replace(/\D/g, '').slice(0, 6);
    if (!pasted) return;
    e.preventDefault();
    const next = Array(6).fill('');
    for (let i = 0; i < pasted.length; i++) next[i] = pasted[i];
    setDigits(next);
    refs.current[Math.min(pasted.length, 5)]?.focus();
  };

  const resend = () => {
    if (seconds > 0) return;
    setSeconds(60);
    setResent((r) => r + 1);
    setDigits(Array(6).fill(''));
    refs.current[0]?.focus();
  };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 32 }}>
      {/* Phone preview card */}
      <div style={{
        width: '100%', maxWidth: 420,
        padding: '18px 20px', borderRadius: 16,
        background: '#fff', border: `1px solid ${line}`,
        display: 'flex', alignItems: 'center', gap: 14
      }}>
        <div style={{
          width: 42, height: 42, borderRadius: 12,
          background: greenSoft, color: green,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontSize: 20
        }}>📱</div>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 13, fontWeight: 800, letterSpacing: '-0.2px' }}>SMS enviado</div>
          <div style={{ fontSize: 12, color: muted, fontWeight: 500, marginTop: 2 }}>
            Revisá los mensajes de tu celular
          </div>
        </div>
      </div>

      {/* 6 digit inputs */}
      <div style={{ display: 'flex', gap: 10, justifyContent: 'center' }}>
        {digits.map((d, i) =>
        <input
          key={i}
          ref={(el) => refs.current[i] = el}
          value={d}
          onChange={(e) => setDigit(i, e.target.value)}
          onKeyDown={(e) => onKeyDown(i, e)}
          onPaste={onPaste}
          inputMode="numeric"
          maxLength={1}
          style={{ ...{
              width: 58, height: 72, borderRadius: 14,
              border: d ? `2px solid ${green}` : `1.5px solid ${line}`,
              background: d ? greenSoft : '#fff',
              fontSize: 30, fontWeight: 900, textAlign: 'center',
              fontFamily: FONT, color: ink,
              outline: 'none',
              boxShadow: d ? `0 2px 0 ${green}` : '0 1px 0 rgba(0,0,0,0.02)',
              transition: 'all .15s'
            }, border: "1.5px dashed rgb(1, 143, 71)" }} />

        )}
      </div>

      {/* Resend block */}
      <div style={{ textAlign: 'center' }}>
        <div style={{ fontSize: 13, color: muted, fontWeight: 500 }}>
          ¿No te llegó el código?
        </div>
        <button
          onClick={resend}
          disabled={seconds > 0}
          style={{
            marginTop: 8, padding: '10px 22px', borderRadius: 10,
            background: seconds > 0 ? 'transparent' : '#fff',
            border: seconds > 0 ? 'none' : `1.5px solid ${ink}`,
            color: seconds > 0 ? muted : ink,
            fontSize: 13, fontWeight: 800, fontFamily: FONT,
            cursor: seconds > 0 ? 'not-allowed' : 'pointer',
            letterSpacing: '-0.1px'
          }}>
          
          {seconds > 0 ?
          `Reenviar en ${String(Math.floor(seconds / 60)).padStart(2, '0')}:${String(seconds % 60).padStart(2, '0')}` :
          'Reenviar SMS'}
        </button>
        {resent > 0 && seconds > 0 &&
        <div style={{ marginTop: 10, fontSize: 12, color: green, fontWeight: 700 }}>
            ✓ Código reenviado
          </div>
        }
      </div>
    </div>);

}

Object.assign(window, { StepSMS });
</script>

<script type="text/babel" data-source="StepOferta.jsx">
// Step 4 — Oferta: slider for monto + cuotas selector

function formatARS(n) {
  return '$' + Math.round(n).toLocaleString('es-AR');
}

function StepOferta({ value, onChange }) {
  const { FONT, ink, muted, line, yellow, yellowDark, green, greenSoft, greenDark } = TOKENS;

  const MIN = 100000;
  const MAX = 2500000;
  const STEP = 50000;

  // Simple TNA for realistic display
  const TNA = 0.82; // 82% TNA (realistic AR)
  const cuotasOptions = [6, 12, 18, 24, 36];

  const setMonto = (m) => onChange({ ...value, monto: m });
  const setCuotas = (c) => onChange({ ...value, cuotas: c });

  // Monthly payment using french system
  const calcCuota = (P, n) => {
    const i = TNA / 12;
    return (P * i) / (1 - Math.pow(1 + i, -n));
  };
  const cuotaValor = calcCuota(value.monto, value.cuotas);
  const total = cuotaValor * value.cuotas;
  const cft = ((Math.pow(1 + TNA / 12, 12) - 1) * 100); // approx CFT annual

  const pct = ((value.monto - MIN) / (MAX - MIN)) * 100;

  return (
    <div style={{ width: '100%', maxWidth: 620, margin: '0 auto', display: 'flex', flexDirection: 'column', gap: 15 }}>
      {/* Hero display of selected amount */}
      <div style={{
        padding: '16px 20px', borderRadius: 16,
        background: `linear-gradient(180deg, ${yellow}33 0%, ${greenSoft} 100%)`,
        border: `2px solid ${green}`,
        textAlign: 'center', position: 'relative', overflow: 'hidden',
      }}>
        <div style={{
          position: 'absolute', top: 10, right: 14,
          padding: '4px 9px', borderRadius: 999,
          background: green, color: '#fff',
          fontSize: 10, fontWeight: 800, letterSpacing: '0.5px', textTransform: 'uppercase',
        }}>Pre-aprobado</div>
        <div style={{ fontSize: 11, fontWeight: 700, color: muted, letterSpacing: '0.5px', textTransform: 'uppercase' }}>
          Monto solicitado
        </div>
        <div style={{ fontSize: 42, fontWeight: 900, letterSpacing: '-2px', color: ink, lineHeight: 1, marginTop: 2 }}>
          {formatARS(value.monto)}
        </div>
        <div style={{ fontSize: 13, fontWeight: 600, color: muted, marginTop: 5 }}>
          en {value.cuotas} cuotas de <b style={{ color: green }}>{formatARS(cuotaValor)}</b>
        </div>
      </div>

      {/* Slider */}
      <div>
        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
          <span style={{ fontSize: 12, fontWeight: 800, letterSpacing: '-0.1px', textTransform: 'uppercase' }}>
            ¿Cuánto necesitás?
          </span>
          <span style={{ fontSize: 12, color: muted, fontWeight: 600 }}>
            Mín {formatARS(MIN)} · Máx {formatARS(MAX)}
          </span>
        </div>
        <div style={{ position: 'relative', padding: '8px 0' }}>
          <div style={{
            height: 10, borderRadius: 999, background: line, position: 'relative', overflow: 'hidden',
          }}>
            <div style={{
              position: 'absolute', inset: 0, width: `${pct}%`,
              background: `linear-gradient(90deg, ${yellow} 0%, ${yellowDark} 100%)`,
              borderRadius: 999,
            }} />
          </div>
          <input
            type="range"
            min={MIN} max={MAX} step={STEP}
            value={value.monto}
            onChange={e => setMonto(Number(e.target.value))}
            style={{
              position: 'absolute', inset: 0, width: '100%', height: '100%',
              opacity: 0, cursor: 'pointer',
            }}
          />
          <div style={{
            position: 'absolute', top: '50%', left: `calc(${pct}% )`,
            transform: 'translate(-50%, -50%)',
            width: 28, height: 28, borderRadius: '50%',
            background: '#fff', border: `3px solid ${green}`,
            boxShadow: `0 3px 0 ${greenDark}, 0 6px 14px rgba(0,0,0,0.15)`,
            pointerEvents: 'none',
          }} />
        </div>
      </div>

      {/* Cuotas selector */}
      <div>
        <div style={{ fontSize: 12, fontWeight: 800, letterSpacing: '-0.1px', textTransform: 'uppercase', marginBottom: 7 }}>
          Cantidad de cuotas
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: `repeat(${cuotasOptions.length}, 1fr)`, gap: 8 }}>
          {cuotasOptions.map(c => {
            const active = c === value.cuotas;
            const cVal = calcCuota(value.monto, c);
            return (
              <button
                key={c}
                onClick={() => setCuotas(c)}
                style={{
                  padding: '10px 6px', borderRadius: 12,
                  background: active ? '#fff' : '#fff',
                  border: active ? `2px solid ${green}` : `1.5px solid ${line}`,
                  boxShadow: active ? `0 3px 0 ${green}` : 'none',
                  cursor: 'pointer', fontFamily: FONT,
                  display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4,
                  transition: 'all .1s',
                }}
              >
                <div style={{ fontSize: 20, fontWeight: 900, color: active ? green : ink, letterSpacing: '-0.6px' }}>
                  {c}
                </div>
                <div style={{ fontSize: 10, fontWeight: 700, color: muted, textTransform: 'uppercase', letterSpacing: '0.3px' }}>
                  cuotas
                </div>
                <div style={{ fontSize: 11, fontWeight: 700, color: active ? ink : muted, marginTop: 2 }}>
                  {formatARS(cVal)}

          <span style={{ fontSize: 13, color: muted, fontWeight: 600 }}>TNA</span>
          <span style={{ fontSize: 13, fontWeight: 800, color: ink }}>{(TNA * 100).toFixed(2)}%</span>
        </div>
        <div style={{ display: 'flex', justifyContent: 'space-between', padding: '4px 0' }}>
          <span style={{ fontSize: 13, color: muted, fontWeight: 600 }}>CFT aprox.</span>
          <span style={{ fontSize: 13, fontWeight: 800, color: ink }}>{cft.toFixed(2)}%</span>
        </div>
      </div>
    </div>
  );
}

Object.assign(window, { StepOferta, formatARS });

</script>

  const { FONT, ink, line, green, greenSoft } = TOKENS;

  // Mask the digits as XX-XXXXXXXX-X

    const d = raw.replace(/\D/g, '').slice(0, 11);
    let out = d;
    if (d.length > 2) out = d.slice(0, 2) + '-' + d.slice(2);
    if (d.length > 10) out = d.slice(0, 2) + '-' + d.slice(2, 10) + '-' + d.slice(10);
    return out;
  };

  const digits = (value || '').replace(/\D/g, '');
  const filled = digits.length === 11;

  return (
    <input
      value={format(value || '')}
      onChange={(e) => onChange(e.target.value.replace(/\D/g, '').slice(0, 11))}
      onFocus={() => setFocused(true)}
      onBlur={() => setFocused(false)}

        transition: 'all .15s',
      }}
    />
  );
}

// A mocked "razón social lookup" — when CUIT is complete, show a fake matched company.
function emisorLookup(cuitDigits) {
  if (cuitDigits.length !== 11) return null;
  // Deterministic mock — same CUIT → same razón social
  const names = [
    'Distribuidora del Sur S.A.',
    'Agroindustrias Patagonia S.R.L.',
    'Comercial San Martín S.A.',
    'Transportes Neuquinos S.R.L.',
    'Frigorífico Los Andes S.A.',
  ];
  const seed = parseInt(cuitDigits.slice(2, 6), 10) || 0;
  return {
    razonSocial: names[seed % names.length],
    cuit: cuitDigits,
  };
}

}

function BankAutocomplete({ value, onChange, placeholder = 'Escribí el nombre del banco...' }) {
  const { FONT, ink, muted, line, green, greenSoft } = TOKENS;
  const [query, setQuery] = React.useState(value || '');
  const [open, setOpen] = React.useState(false);
  const [focused, setFocused] = React.useState(false);
  const wrapRef = React.useRef(null);

  React.useEffect(() => {
    if (value && value !== query) setQuery(value);
  }, [value]);

  React.useEffect(() => {
    const handler = (e) => {
      if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false);
    };
    document.addEventListener('pointerdown', handler);
    return () => document.removeEventListener('pointerdown', handler);
  }, []);

  const normalize = (s) => s.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');

  const filtered = query.trim().length > 0
    ? BANCOS_ARGENTINA.filter(b => normalize(b).includes(normalize(query.trim())))
    : [];

  const isValid = BANCOS_ARGENTINA.includes(value);

  const handleSelect = (banco) => {
    setQuery(banco);
    onChange(banco);
    setOpen(false);
  };

  const handleInputChange = (e) => {
    const v = e.target.value;
    setQuery(v);
    setOpen(v.trim().length > 0);
    if (!BANCOS_ARGENTINA.includes(v)) onChange('');
  };

  return (
    <div ref={wrapRef} style={{ position: 'relative' }}>
      <input
        type="text"
        value={query}
        onChange={handleInputChange}
        onFocus={() => { setFocused(true); if (query.trim().length > 0 && !isValid) setOpen(true); }}
        onBlur={() => {
          setFocused(false);
          if (!isValid && query.trim()) {
            setTimeout(() => { if (!wrapRef.current?.contains(document.activeElement)) setOpen(false); }, 200);
          }
        }}
        placeholder={placeholder}
        style={{
          width: '100%', padding: '14px 16px', borderRadius: 12,
          border: focused ? `2px solid ${green}` : isValid ? `1.5px solid ${green}88` : `1.5px solid ${line}`,
          background: focused ? greenSoft : '#fff',
          fontSize: 14, fontWeight: 600, fontFamily: FONT, color: ink,
          outline: 'none', transition: 'all .15s',
        }}
      />
      {isValid && (
        <div style={{ position: 'absolute', right: 12, top: '50%', transform: 'translateY(-50%)' }}>
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <circle cx="9" cy="9" r="9" fill={green}/>
            <path d="M5 9.5 L7.5 12 L13 6" stroke="#fff" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        </div>
      )}
      {open && filtered.length > 0 && (
        <div style={{
          position: 'absolute', top: '100%', left: 0, right: 0, zIndex: 100,
          marginTop: 4, maxHeight: 220, overflowY: 'auto',
          background: '#fff', borderRadius: 12,
          border: `1.5px solid ${line}`,
          boxShadow: '0 8px 24px rgba(0,0,0,0.12)',
        }}>
          {filtered.slice(0, 12).map((banco) => {
            const idx = normalize(banco).indexOf(normalize(query.trim()));
            const before = banco.slice(0, idx);
            const match = banco.slice(idx, idx + query.trim().length);
            const after = banco.slice(idx + query.trim().length);
            return (
              <div
                key={banco}
                onPointerDown={(e) => { e.preventDefault(); handleSelect(banco); }}
                style={{
                  padding: '10px 14px', cursor: 'pointer',
                  fontSize: 13, fontWeight: 600, color: ink,
                  fontFamily: FONT, transition: 'background 0.1s',
                  borderBottom: `1px solid ${line}22`,
                }}
                onMouseEnter={(e) => e.currentTarget.style.background = greenSoft}
                onMouseLeave={(e) => e.currentTarget.style.background = '#fff'}
              >
                {before}<b style={{ color: green, fontWeight: 900 }}>{match}</b>{after}
              </div>
            );
          })}
        </div>
      )}
      {open && query.trim().length > 0 && filtered.length === 0 && (
        <div style={{
          position: 'absolute', top: '100%', left: 0, right: 0, zIndex: 100,
          marginTop: 4, padding: '12px 14px',

// Step 5 — Resumen: simulación de liquidación del cheque
// ───────────────────────────────────────────────────────
// FORMULAS (reverse-engineered from production example):
//
//  Contado          = Nominal / (1 + TNA × Días / 365)          ← "true discount"
//  Interés          = Nominal − Contado
//
//  Derecho Mercado  = Nominal × 0.24%  × Días / 365            ← simple interest on nominal
//  Comisión Agente  = Nominal × 1.50%  × Días / 365            ← simple interest on nominal
//  Comisión SGR     = Nominal × 2.00%  × Días / 365            ← simple interest on nominal
//  Gastos Admin.    = Nominal × 0.50%  × Días / 365            ← simple interest on nominal
//
//  IVA (21%)        applied to: Derecho, Comisión Agente, Gastos Admin
//
//  Neto = Contado − Σ(fees + IVAs)
// ───────────────────────────────────────────────────────

// Configurable annual rates (simple interest basis on nominal)
const SIM_RATES = {
  derechoMercado: 0.0024,   // 0.24%
  comisionAgente: 0.015,    // 1.50%
  comisionSGR:    0.02,     // 2.00%
  gastosAdmin:    0.005,    // 0.50%
  iva:            0.21,     // 21%
};

function formatARSResumen(n) {
  return '$' + Math.abs(Math.round(n * 100) / 100).toLocaleString('es-AR', {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2,
  });
}

function diasEntre(fechaStr) {
  if (!fechaStr) return 30;
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const target = new Date(fechaStr + 'T00:00:00');
  const ms = target - today;
  const days = Math.round(ms / (1000 * 60 * 60 * 24));
  return days > 0 ? days : 30;
}

// Compute the full simulation
function simulateCheque({ nominal, tasaAnual, dias }) {
  // 1) Contado via true discount
  const contado = nominal / (1 + tasaAnual * dias / 365);
  const interes = nominal - contado;

  // 2) Fees — simple interest on nominal
  const simpleBase = nominal * dias / 365;

  const derechoMercado = simpleBase * SIM_RATES.derechoMercado;
  const ivaDerecho     = derechoMercado * SIM_RATES.iva;

  const comisionAgente = simpleBase * SIM_RATES.comisionAgente;
  const ivaComision    = comisionAgente * SIM_RATES.iva;

  const comisionSGR    = simpleBase * SIM_RATES.comisionSGR;

  const gastosAdmin    = simpleBase * SIM_RATES.gastosAdmin;
  const ivaGastos      = gastosAdmin * SIM_RATES.iva;

  // 3) Neto
  const totalGastos =
    derechoMercado + ivaDerecho +
    comisionAgente + ivaComision +
    comisionSGR +
    gastosAdmin + ivaGastos;

  const neto = contado - totalGastos;

  return {
    contado, interes,
    derechoMercado, ivaDerecho,
    comisionAgente, ivaComision,
    comisionSGR,
    gastosAdmin, ivaGastos,
    totalGastos, neto,
  };
}

// ── UI helpers ──

function ResumenRow({ label, value, indent = 0, dim = false, total = false }) {

      }}>{value}</span>
    </div>

}

function ResumenGroup({ children, last = false }) {

// ── Tooltip with formulas ──

function FormulasTooltip() {
  const { FONT, ink, muted, line, accent } = TOKENS;

    { label: 'IVA Derecho',          formula: `Derecho × ${(SIM_RATES.iva * 100).toFixed(0)}%` },

    { label: 'Gastos Admin.',        formula: `Nominal × ${(SIM_RATES.gastosAdmin * 100).toFixed(2)}% × Días / 365` },

          }}>
            Fórmulas de cálculo
          </div>

          <div style={{ display: 'grid', gap: 6 }}>
            {rows.map((r, i) => (
              <div key={i} style={{
                display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                padding: '5px 0',

                  ? `1px dashed ${line}` : 'none',
              }}>
                <span style={{ fontSize: 12, fontWeight: 700, color: muted, minWidth: 130 }}>

            Interés usa descuento compuesto (true discount). Comisiones y gastos usan interés simple sobre el valor nominal. IVA al 21%.
          </div>
        </div>
        </div>
      , document.body)}
    </div>

// Renderers for the 4 legal documents in StepFirma.
// Each takes the full `formData` from the flow and fills in the contract.

// ── Helpers ──────────────────────────────────────────────────────────

function today() {
  const d = new Date();
  return { dia: d.getDate(), mes: d.getMonth() + 1, anio: d.getFullYear() };
}

const MESES_ES = [
  'enero', 'febrero', 'marzo', 'abril', 'mayo', 'junio',
  'julio', 'agosto', 'septiembre', 'octubre', 'noviembre', 'diciembre',
];

function fechaLarga({ dia, mes, anio }) {
  return `${dia} de ${MESES_ES[mes - 1]} de ${anio}`;
}

function fechaCorta(fechaStr) {
  if (!fechaStr) return '';
  const d = new Date(fechaStr + 'T00:00:00');
  return d.toLocaleDateString('es-AR');
}

function formatARSDoc(n) {
  return Math.round(Number(n) || 0).toLocaleString('es-AR');
}

function formatARSDoc2(n) {
  const v = Math.round((Number(n) || 0) * 100) / 100;
  return v.toLocaleString('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

// Simple Spanish number-to-words (handles up to ~999.999.999)
function numeroALetras(n) {
  n = Math.round(Number(n) || 0);
  if (n === 0) return 'cero';

  const UNI = ['','uno','dos','tres','cuatro','cinco','seis','siete','ocho','nueve','diez',
               'once','doce','trece','catorce','quince','dieciséis','diecisiete','dieciocho','diecinueve','veinte',
               'veintiuno','veintidós','veintitrés','veinticuatro','veinticinco','veintiséis','veintisiete','veintiocho','veintinueve'];
  const DEC = ['','','','treinta','cuarenta','cincuenta','sesenta','setenta','ochenta','noventa'];
  const CEN = ['','ciento','doscientos','trescientos','cuatrocientos','quinientos','seiscientos','setecientos','ochocientos','novecientos'];

  function decenas(n) {
    if (n < 30) return UNI[n] || '';
    const d = Math.floor(n / 10), u = n % 10;
    return u === 0 ? DEC[d] : `${DEC[d]} y ${UNI[u]}`;
  }
  function centenas(n) {
    if (n === 0) return '';
    if (n === 100) return 'cien';
    const c = Math.floor(n / 100), r = n % 100;
    const cs = CEN[c];
    return r === 0 ? cs : `${cs} ${decenas(r)}`;
  }
  function miles(n) {
    if (n < 1000) return centenas(n);
    const m = Math.floor(n / 1000), r = n % 1000;
    const mtxt = m === 1 ? 'mil' : `${centenas(m).replace(/uno$/, 'un')} mil`;
    return r === 0 ? mtxt : `${mtxt} ${centenas(r)}`;
  }
  function millones(n) {
    if (n < 1_000_000) return miles(n);
    const m = Math.floor(n / 1_000_000), r = n % 1_000_000;
    const mtxt = m === 1 ? 'un millón' : `${miles(m).replace(/uno$/, 'un')} millones`;
    return r === 0 ? mtxt : `${mtxt} ${miles(r)}`;
  }

  return millones(n);
}

function capitalize(s) {
  return s.charAt(0).toUpperCase() + s.slice(1);
}

// Convenience: format a "domicilio object" from form.domicilio
function domicilioCompleto(d) {
  if (!d) return '—';
  const parts = [];
  if (d.calle) parts.push(d.calle);
  if (d.numero) parts.push(d.numero);
  return parts.join(' ') || '—';
}

// Build client identity from real form data:
//  - nombre comes from cbu.titularCuenta (entered in CBU step)
//  - CUIT comes from emisor.cuitBeneficiario (entered in Emisor step)
//  - DNI is derived from the middle 8 digits of the CUIT
function getClienteData(formData) {
  const nombre = formData?.cbu?.titularCuenta || '—';

  const cuitRaw = (formData?.emisor?.cuitBeneficiario || '').replace(/\D/g, '');
  let cuit = '—';
  let dni = '—';
  if (cuitRaw.length === 11) {
    cuit = `${cuitRaw.slice(0,2)}-${cuitRaw.slice(2,10)}-${cuitRaw.slice(10)}`;
    const dniNum = parseInt(cuitRaw.slice(2, 10), 10);
    dni = dniNum.toLocaleString('es-AR');
  }

  return { nombre, dni, cuit };
}

// Format a CUIT string (11 raw digits → XX-XXXXXXXX-X)
function formatCuit(raw) {
  const d = (raw || '').replace(/\D/g, '');
  if (d.length !== 11) return raw || '—';
  return `${d.slice(0,2)}-${d.slice(2,10)}-${d.slice(10)}`;
}

function DocPage({ children, title, subtitle, footer }) {

function ContratoCesion({ formData }) {

// Step Fotos — simulated camera: 2 random selfies + DNI frente + DNI dorso
// Selfies: countdown → flash → auto-done (no confirmation)
// DNI:     instant flash → confirmation ("¿Salió bien?")
function StepFotos({ value, onChange }) {
  const { FONT, ink, muted, line, green, primary, danger } = TOKENS;

  // All possible random selfie expressions
  const SELFIE_OPTIONS = [
    {
      type: 'neutra',
      label: 'Selfie neutra',
      instruction: 'Mirá a la cámara con expresión neutra',
      icon:
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">

    },
    {
      type: 'sonriente',
      label: 'Selfie sonriente',
      instruction: 'Sonreí naturalmente a la cámara',
      icon:
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <circle cx="24" cy="20" r="8" stroke="#fff" strokeWidth="2.5" fill="none" />
          <path d="M8 40 C8 31 16 28 24 28 C32 28 40 31 40 40" stroke="#fff" strokeWidth="2.5" fill="none" strokeLinecap="round" />
          <path d="M19 29 Q24 34 29 29" stroke="rgba(255,255,255,0.6)" strokeWidth="1.5" fill="none" strokeLinecap="round" />
        </svg>
    },
    {
      type: 'guinoIzq',

      instruction: 'Guiñá tu ojo izquierdo (el que está a tu izquierda)',
      icon:
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <circle cx="24" cy="20" r="8" stroke="#fff" strokeWidth="2.5" fill="none" />
          <path d="M8 40 C8 31 16 28 24 28 C32 28 40 31 40 40" stroke="#fff" strokeWidth="2.5" fill="none" strokeLinecap="round" />
          <path d="M19.5 18.5 L23 18.5" stroke="#fff" strokeWidth="1.6" strokeLinecap="round" />
          <circle cx="27" cy="18.5" r="1.3" fill="#fff" />
          <line x1="19" y1="30" x2="29" y2="30" stroke="rgba(255,255,255,0.5)" strokeWidth="1.5" strokeLinecap="round" />
        </svg>
    },
    {
      type: 'guinoDer',
      label: 'Guiño ojo derecho',
      instruction: 'Guiñá tu ojo derecho (el que está a tu derecha)',
      icon:
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <circle cx="24" cy="20" r="8" stroke="#fff" strokeWidth="2.5" fill="none" />
          <path d="M8 40 C8 31 16 28 24 28 C32 28 40 31 40 40" stroke="#fff" strokeWidth="2.5" fill="none" strokeLinecap="round" />
          <circle cx="21" cy="18.5" r="1.3" fill="#fff" />
          <path d="M25 18.5 L28.5 18.5" stroke="#fff" strokeWidth="1.6" strokeLinecap="round" />
          <line x1="19" y1="30" x2="29" y2="30" stroke="rgba(255,255,255,0.5)" strokeWidth="1.5" strokeLinecap="round" />
        </svg>
    }
  ];

  // Randomly assign 2 distinct selfie expressions (stable across re-renders within mount)
  const randomSelfies = React.useMemo(() => {
    const shuffled = [...SELFIE_OPTIONS].sort(() => Math.random() - 0.5);
    return shuffled.slice(0, 2);
  }, []);

  const CAPTURES = [
  {
    id: 'selfieNeutra',
    label: randomSelfies[0].label,
    instruction: randomSelfies[0].instruction,
    shape: 'oval',
    isSelfie: true,
    icon: randomSelfies[0].icon
  },
  {
    id: 'selfieSonriente',
    label: randomSelfies[1].label,
    instruction: randomSelfies[1].instruction,
    shape: 'oval',
    isSelfie: true,
    icon: randomSelfies[1].icon
  },
  {
    id: 'dniFrente',
    label: 'Frente DNI',
    instruction: 'Encuadrá el frente del DNI dentro del recuadro',
    shape: 'rect',
    isSelfie: false,
    icon:
    <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <rect x="6" y="12" width="36" height="24" rx="3" stroke="#fff" strokeWidth="2.5" fill="none" />

          <rect x="24" y="18" width="13" height="2.5" rx="1" fill="rgba(255,255,255,0.5)" />
          <rect x="24" y="23" width="10" height="2" rx="1" fill="rgba(255,255,255,0.3)" />
          <rect x="24" y="28" width="13" height="2" rx="1" fill="rgba(255,255,255,0.3)" />
        </svg>

  },
  {
    id: 'dniDorso',
    label: 'Dorso DNI',
    instruction: 'Encuadrá el dorso del DNI dentro del recuadro',
    shape: 'rect',
    isSelfie: false,
    icon:
    <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <rect x="6" y="12" width="36" height="24" rx="3" stroke="#fff" strokeWidth="2.5" fill="none" />

          <rect x="10" y="27" width="26" height="2" rx="1" fill="rgba(255,255,255,0.3)" />
          <rect x="10" y="31" width="16" height="2" rx="1" fill="rgba(255,255,255,0.3)" />
        </svg>

  }];


  // Phases per capture: 'camera' → 'countdown' → 'flash' → 'confirm' → done
  const currentIdx = CAPTURES.findIndex((c) => !value[c.id]);
  const allDone = currentIdx === -1;
  const current = allDone ? null : CAPTURES[currentIdx];

  const [phase, setPhase] = React.useState('camera'); // camera | countdown | flash | confirm
  const [countdown, setCountdown] = React.useState(null);

  // Reset phase when moving to next capture
  React.useEffect(() => {
    setPhase('camera');
  }, [currentIdx]);

  const doCapture = () => {
    if (current.isSelfie) {
      // Selfies: countdown → flash → auto-done (no confirmation)
      setPhase('countdown');
      setCountdown(3);
      let c = 3;
      const iv = setInterval(() => {
        c--;
        if (c > 0) {
          setCountdown(c);
        } else {
          clearInterval(iv);
          setCountdown(null);
          setPhase('flash');
          setTimeout(() => {
            // Mark this selfie as done automatically — no confirm screen
            onChange({ ...value, [current.id]: true });
          }, 500);
        }
      }, 800);
    } else {
      // DNI photos: no countdown — flash → confirm directly
      setPhase('flash');
      setTimeout(() => {
        setPhase('confirm');
      }, 400);
    }
  };

  const handleConfirmYes = () => {
    onChange({ ...value, [current.id]: true });
    // phase will reset via useEffect
  };

  const handleConfirmNo = () => {
    setPhase('camera');

  const isCapturing = phase === 'countdown' || phase === 'flash';

  // Progress dots
  const progressDots =
  <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6, marginBottom: 4 }}>
      {CAPTURES.map((c, i) => {
      const done = !!value[c.id];
      const active = i === currentIdx;
      return (
        <React.Fragment key={c.id}>

              <div style={{
              width: 26, height: 26, borderRadius: 999,
              background: done ? green : active ? primary : `${line}`,

              display: 'flex', alignItems: 'center', justifyContent: 'center',
              fontSize: 11, fontWeight: 800,
              transition: 'all .3s'
            }}>
                {done ?
              <svg width="12" height="12" viewBox="0 0 14 14" fill="none">
                    <path d="M2.5 7.5 L5.5 10.5 L11.5 3.5" stroke="#fff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />

              i + 1}
              </div>
              <span style={{
              fontSize: 10, fontWeight: 700,
              color: done ? green : active ? ink : muted,
              whiteSpace: 'nowrap'
            }}>{c.label}</span>
            </div>
            {i < CAPTURES.length - 1 &&
          <div style={{
            width: 20, height: 2, borderRadius: 2,
            background: done ? green : line
          }} />
          }
          </React.Fragment>);

    })}
    </div>;


  // Camera viewfinder
  const cameraView = current && phase !== 'confirm' &&
  <div style={{
    position: 'relative', width: '100%',
    aspectRatio: current.shape === 'oval' ? '3/4' : '4/3',
    borderRadius: 18, overflow: 'hidden',
    background: 'linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)',
    border: `2px solid ${isCapturing ? green : '#333'}`,
    transition: 'border-color .3s', height: "300px"
  }}>
      {/* Noise */}
      <div style={{
      position: 'absolute', inset: 0,
      background: 'repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.015) 2px, rgba(255,255,255,0.015) 4px)',
      pointerEvents: 'none'
    }} />
      {/* Guide shape */}
      <div style={{
      position: 'absolute', inset: 0,
      display: 'flex', alignItems: 'center', justifyContent: 'center', height: "300px"
    }}>
        {current.shape === 'oval' ?
      <div style={{
        width: '55%', height: '65%', borderRadius: '50%',
        border: `3px dashed rgba(255,255,255,${isCapturing ? 0.8 : 0.35})`,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        transition: 'border-color .3s'
      }}>{current.icon}</div> :

      <div style={{
        width: '80%', height: '60%', borderRadius: 12,
        border: `3px dashed rgba(255,255,255,${isCapturing ? 0.8 : 0.35})`,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        transition: 'border-color .3s'
      }}>{current.icon}</div>
      }
      </div>
      {/* Instruction */}
      <div style={{
      position: 'absolute', bottom: 0, left: 0, right: 0,
      padding: '12px 16px',
      background: 'linear-gradient(transparent, rgba(0,0,0,0.7))',
      color: '#fff', fontSize: 13, fontWeight: 700,
      textAlign: 'center', letterSpacing: '-0.1px'
    }}>{current.instruction}</div>
      {/* Countdown */}
      {phase === 'countdown' && countdown &&
    <div style={{
      position: 'absolute', inset: 0,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      background: 'rgba(0,0,0,0.4)'
    }}>
          <div style={{
        width: 80, height: 80, borderRadius: 999,
        background: 'rgba(255,255,255,0.15)', backdropFilter: 'blur(4px)',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        fontSize: 36, fontWeight: 900, color: '#fff',
        animation: 'pulse-count .8s ease-in-out'
      }}>{countdown}</div>
        </div>
    }
      {/* Flash */}
      {phase === 'flash' &&
    <div style={{
      position: 'absolute', inset: 0, background: '#fff',
      animation: 'flash-fade .4s ease-out forwards'
    }} />
    }
    </div>;


  // Capture button
  const captureBtn = current && phase === 'camera' &&
  <button
    onClick={doCapture}

      width: 68, height: 68, borderRadius: 999,
      background: '#fff', border: `4px solid ${ink}`,
      cursor: 'pointer', margin: '0 auto',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      transition: 'all .2s'

      <div style={{
      width: 52, height: 52, borderRadius: 999, background: ink,
      transition: 'background .2s'
    }} />
    </button>;


  // Confirmation card after capture
  const confirmCard = current && phase === 'confirm' &&
  <div style={{
    padding: 28, borderRadius: 18,
    background: '#fff', border: `2px solid ${line}`,
    textAlign: 'center'
  }}>
      {/* Simulated captured image */}
      <div style={{
      width: '100%',
      aspectRatio: current.shape === 'oval' ? '3/4' : '4/3',
      maxHeight: 280,
      borderRadius: 14, overflow: 'hidden', margin: '0 auto 20px',
      background: 'linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      position: 'relative'
    }}>
        {current.shape === 'oval' ?
      <div style={{
        width: '55%', height: '65%', borderRadius: '50%',
        border: '3px solid rgba(255,255,255,0.5)',
        display: 'flex', alignItems: 'center', justifyContent: 'center'

function StepDocs({ value, onChange }) {
